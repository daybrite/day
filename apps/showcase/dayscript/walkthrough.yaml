name: showcase-walkthrough
description: Navigate every destination, exercise every control, take localized screenshots
  (DESIGN.md §14.1, docs/navigation.md). Top-level nav is a selector(Sidebar); tabs a
  selector(Tabs); the stack section is a genuine push/pop stack bound to a path signal. Pages
  are grouped forms (docs/forms.md) — several old pages merged into themed sections.
flow:
  - wait_for: { id: home-title }
  - screenshot: home

  # Controls (docs/forms.md): every interactive control in one grouped form — basics, the three
  # picker stylings, search, and progress/activity feedback.
  - navigate: { route: controls }
  - assert_route: { route: controls }
  - assert_visible: { id: controls-title }
  - input: { id: name-field, text: "Ada" }
  - assert_visible: { id: greeting-label }
  - assert_text: { id: greeting-label, key: greeting, args: { name: "Ada" } }
  - set_value: { id: volume-slider, value: 80 }
  - assert_text: { id: volume-value, text: "80" }
  - toggle: { id: subscribe-toggle, value: true }
  - assert_value: { id: subscribe-toggle, value: true }
  - tap: { id: increment-button, repeat: 3 }
  - assert_text: { id: counter-label, key: counter_value, args: { count: 3 } }
  - select: { id: flavor-combo, index: 2 }
  # Flavor options are localized — assert by key so the check resolves in the run's locale.
  - assert_text: { id: flavor-value, key: pistachio }
  # Pickers section: three native stylings bound two-way to a Signal<usize> — the selection
  # round-trips the signal into each value label.
  # The three picker stylings share ONE selection signal: selecting via any styling must move
  # the other two (each row's readout mirrors the same signal).
  - select: { id: picker-segmented, index: 2 }
  - assert_text: { id: picker-value, key: size_large }
  - select: { id: picker-inline, index: 0 }
  - assert_text: { id: picker-value, key: size_small }
  - select: { id: picker-menu, index: 1 }
  - assert_text: { id: picker-value, key: size_medium }
  # Search section: the native search field filters reactively; Clear proves the reverse binding.
  # The fruits are localized, so the QUERY is typed by key too (`input.key` resolves the Fluent
  # key in the run's locale) — typing the full localized name always matches exactly itself.
  - input: { id: search-input, key: fruit_cherry }
  - assert_text: { id: search-result, key: fruit_cherry }
  - tap: { id: search-clear }
  # Feedback section: the progress bar tracks its slider; the activity spinner obeys its toggle.
  - set_value: { id: progress-slider, value: 80 }
  - assert_value: { id: volume-progress, value: 0.8 }
  - toggle: { id: activity-toggle, value: false }
  - assert_text: { id: activity-status, key: activity_off }
  - screenshot: controls

  # Canvas & shapes: shape kinds, live transforms + gestures, the slider-driven gauge, and the
  # composition-tier widgets. Drive a rotation + a recolor tap so the screenshot shows both.
  - navigate: { route: canvas }
  - assert_route: { route: canvas }
  - assert_visible: { id: canvas-title }
  - set_value: { id: shapes-angle-slider, value: 45 }
  - tap: { id: shapes-tap-circle }
  # Accessibility (§13): diff the native AX tree against day's expectations. The gauge is a
  # canvas, so day applies role=Meter + a spoken label/value; the audit reads them back natively
  # (apple targets; gtk/qt report unsupported and skip). A full-tree audit follows.
  - assert_visible: { id: gauge }
  - a11y_audit: { id: gauge }
  - a11y_audit: {}
  # Compose section: tap the 4th star (each star is `compose-rating:N`) and assert the bound
  # text field re-rendered with the count.
  - tap: { id: "compose-rating:4" }
  - assert_text: { id: compose-rating-value, text: "4" }
  - screenshot: canvas

  # Device & sensors: the headless device-state parts in one form. The battery preview slider +
  # charging toggle drive a deterministic state (65% + bolt) for the screenshot, then a low
  # level checks the readout; sensors need a second poll after the first read arms the listener
  # (push-model platforms); CI hosts are online; device identity varies, so presence only.
  - navigate: { route: system }
  - assert_route: { route: system }
  - assert_visible: { id: battery }
  - a11y_audit: { id: battery }
  - set_value: { id: battery-level, value: 65 }
  - toggle: { id: battery-charging, value: true }
  - tap: { id: network-refresh }
  - tap: { id: sensors-refresh }
  - tap: { id: sensors-refresh }
  - assert_visible: { id: sensor-accel }
  - assert_visible: { id: deviceinfo-model }
  - tap: { id: deviceinfo-refresh }
  - assert_visible: { id: deviceinfo-system }
  - screenshot: system
  - set_value: { id: battery-level, value: 12 }
  - assert_text: { id: battery-level-value, text: "12%" }
  - set_value: { id: battery-level, value: 65 }

  # Platform services: clipboard round-trip, persisted prefs, haptics, and the native file
  # pickers — one form, one screenshot. The strict OS clipboard assertion lives in
  # scripts/clipboard-roundtrip.yaml (macOS + Android only; headless Linux has no system
  # clipboard). The save/open pickers answer with a temp path (relative → app temp dir).
  - navigate: { route: services }
  - assert_route: { route: services }
  - assert_visible: { id: clipboard-field }
  # Screenshot the pristine form BEFORE the clipboard copy: Android 13+ pops a system
  # clipboard-preview overlay on copy that lingers several seconds and would photobomb the shot.
  - screenshot: services
  - input: { id: clipboard-field, text: "day walkthrough clip" }
  - tap: { id: clipboard-copy }
  - tap: { id: clipboard-paste }
  - input: { id: prefs-field, text: "day-remembers" }
  - tap: { id: prefs-save }
  - input: { id: prefs-field, text: "overwritten" }
  - tap: { id: prefs-load }
  - assert_text: { id: prefs-value, text: "day-remembers" }
  - assert_visible: { id: haptics-supported }
  - tap: { id: haptics-medium }
  # `#haptics-last-played` is `tr("haptics-last-played")` — a localized string, so assert by
  # key + args so it resolves in the run's locale, not a hardcoded English literal.
  - assert_text: { id: haptics-last-played, key: haptics_last_played, args: { style: "Medium" } }
  - tap: { id: haptics-success }
  - assert_text: { id: haptics-last-played, key: haptics_last_played, args: { style: "Success" } }
  - tap: { id: btn-save-file }
  - assert_presented: {}
  - respond: { path: "day-walkthrough.txt" }
  - assert_text: { id: files-status, text: "saved:day-walkthrough.txt" }
  - tap: { id: btn-open-file }
  - assert_presented: {}
  - respond: { path: "day-walkthrough.txt" }
  - assert_text: { id: files-status, text: "opened" }
  - assert_text: { id: files-opened-name, key: files_opened, args: { name: "day-walkthrough.txt" } }

  # Menus & lifecycle (docs/menus.md, docs/lifecycle.md).
  - navigate: { route: menus }
  - assert_route: { route: menus }
  - assert_visible: { id: menus-title }
  - screenshot: menus

  # Imperative modals (docs/dialogs.md): open a native dialog, answer it, assert the result.
  - navigate: { route: modals }
  - assert_route: { route: modals }
  - screenshot: modals
  - tap: { id: btn-confirm }
  - assert_presented: {}
  - respond: { button: 1 }
  - assert_text: { id: modal-result, text: "confirm-yes" }
  - tap: { id: btn-delete }
  - assert_presented: {}
  - respond: { button: 1 }
  - assert_text: { id: modal-result, text: "delete-yes" }
  - tap: { id: btn-prompt }
  - assert_presented: {}
  - respond: { text: "Ada" }
  - assert_text: { id: modal-result, text: "prompt-Ada" }
  - tap: { id: btn-sheet }
  - assert_presented: {}
  - respond: { button: 1 }
  - assert_text: { id: modal-result, text: "sheet-1" }

  # Native tabs (docs/tabs.md): a selector(Tabs) bound to a signal. Tab keys are routes, so
  # navigate/assert_route select the active tab; the inner selector reports the innermost route.
  - navigate: { route: tabs }
  # Full-tree routes (docs/navigation.md): the selector key + the tab key.
  - assert_route: { route: tabs/one }
  - assert_visible: { id: tab-one-content }
  - assert_value: { id: demo-tabs, value: 0 }
  - screenshot: tabs-one
  - navigate: { route: two }
  - assert_route: { route: tabs/two }
  - assert_value: { id: demo-tabs, value: 1 }
  - screenshot: tabs-two
  - navigate: { route: three }
  - assert_route: { route: tabs/three }
  - assert_value: { id: demo-tabs, value: 2 }
  - screenshot: tabs-three

  # Genuine push/pop stack (docs/navigation.md): tapping pushes onto the path signal; the
  # native back button writes the pop back into it. current_route reports the stack's top.
  - navigate: { route: stack }
  - assert_visible: { id: stack-root }
  - screenshot: stack-root
  - tap: { id: stack-push }
  - assert_visible: { id: stack-detail }
  # assert_route sees the FULL path: selector key + the stack's segments (docs/navigation.md).
  - assert_route: { route: stack/1 }
  - screenshot: stack-detail
  - tap: { id: stack-deeper }
  - assert_route: { route: stack/1/2 }
  - nav_back:
  - assert_route: { route: stack/1 }
  - nav_back:
  - assert_route: { route: stack }
  # Absolute route with params: anchors the selector, resets the stack, pushes the segment;
  # the destination reads ?hint= via route_param.
  - tap: { id: stack-link }
  - assert_route: { route: stack/item-42 }
  - assert_text: { id: stack-param, key: stack_param_hint, args: { hint: "linked" } }
  - nav_back:
  - assert_route: { route: stack }
  # Leaving via a route the stack doesn't own falls through to the enclosing selector.
  - navigate: { route: about }
  - assert_route: { route: about }
  - assert_visible: { id: about-text }
  - screenshot: about
  - nav_back:
  - assert_route: { route: "" }
  - screenshot: back-home

  # Native recycling list (docs/list.md): 500 virtualized rows — visited after the delicate
  # stack/tabs route assertions so they stay undisturbed.
  - navigate: { route: list }
  - assert_route: { route: list }
  - assert_visible: { id: list-title }
  - screenshot: list

  # Native media player (docs/media.md): an EXTERNAL piece wrapping each toolkit's native player
  # (AVPlayerView / AVPlayerViewController / QMediaPlayer / VideoView / GtkVideo). The pause lets
  # first frames of the network sample arrive; then pause playback so the captured frame is
  # stable. (On iOS/Android the bundled Lottie animation joins this page.)
  - navigate: { route: media }
  - assert_route: { route: media }
  - assert_visible: { id: media-title }
  - pause: { secs: 5 }
  - tap: { id: media-pause }
  - screenshot: media

  # Bundled resources (§18.3): an image loaded by name via the native image pipeline +
  # random-access reads of embedded data through the native data API.
  - navigate: { route: resources }
  - assert_route: { route: resources }
  - assert_visible: { id: resources-numbers }
  - assert_visible: { id: resources-greeting }
  - screenshot: resources

  # Native web view (docs/webview.md): each toolkit's native browser. Load the project site,
  # then `pause` (runner-side — the engine must not block the UI thread) so the page finishes
  # loading before the capture. Visited LAST-ish so a heavy embedded browser can't disturb the
  # route assertions above.
  - navigate: { route: webview }
  - assert_route: { route: webview }
  - assert_visible: { id: webview-title }
  - pause: 5
  - screenshot: webview

  # Tweaks (docs/tweaks.md): packaged per-toolkit native configuration of built-in pieces, plus
  # NativeRef liveness — unmounting the Tweaked Piece clears the ref (asserted via Fluent keys
  # so the same script passes in every locale).
  - navigate: { route: tweaks }
  - assert_route: { route: tweaks }
  - assert_visible: { id: tweaks-title }
  - assert_visible: { id: tweak-bezel-toolbar }
  - assert_visible: { id: tweak-selectable-label }
  - assert_visible: { id: tweak-ticks-slider }
  - assert_text: { id: tweak-ref-status, key: tweaks_ref_live }
  - toggle: { id: tweak-ref-toggle, value: false }
  - assert_text: { id: tweak-ref-status, key: tweaks_ref_cleared }
  - toggle: { id: tweak-ref-toggle, value: true }
  - assert_text: { id: tweak-ref-status, key: tweaks_ref_live }
  - screenshot: tweaks

  # Text playground: semantic styles, weights, and the BUNDLED CUSTOM FONTS (docs/resources.md) —
  # the three Font::Custom families ship in fonts/ and must have been registered by the backend
  # at startup for these labels to realize.
  - navigate: { route: text }
  - assert_route: { route: text }
  - assert_visible: { id: text-title }
  - assert_visible: { id: text-emphasis }
  - assert_visible: { id: text-custom-28 }
  - assert_visible: { id: text-font-pacifico }
  - assert_visible: { id: text-font-bungee }
  - assert_visible: { id: text-font-specialelite }
  - screenshot: text
