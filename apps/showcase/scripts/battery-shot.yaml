name: battery-shot
description: Battery visualization states — charging bolt, low-red, amber.
flow:
  - wait_for: { id: home-title }
  - navigate: { route: battery }
  - set_value: { id: battery-level, value: 65 }
  - toggle: { id: battery-charging, value: true }
  - screenshot: battery-charging
  - toggle: { id: battery-charging, value: false }
  - set_value: { id: battery-level, value: 12 }
  - screenshot: battery-low
  - set_value: { id: battery-level, value: 35 }
  - screenshot: battery-mid
