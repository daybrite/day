day: 1
app:
  name: showcase
  id: dev.daybrite.showcase
  title: Day Showcase
  version: 0.1.0
  build: 1
targets:
  - macos-appkit
  - macos-gtk
  - macos-qt
  - ios-uikit
  - android-widget
  - ohos-arkui
window:
  width: 480
  height: 640
# Release signing (§16.5): values resolve from the environment at pack time — an unset variable
# degrades that section to the dev tier LOUDLY (ad-hoc / dev keystore / self-signed), it never
# fails the pack (§20). Populate the DAY_* variables (CI: repository secrets) to light up release
# signing; `day sign --check` reports readiness without printing any secret.
signing:
  macos:
    identity: ${DAY_SIGN_MACOS_IDENTITY} # "Developer ID Application: …"
    notarize:
      key-id: ${DAY_NOTARY_KEY_ID}
      issuer: ${DAY_NOTARY_ISSUER}
      key-path: ${DAY_NOTARY_KEY} # AuthKey_<id>.p8
  ios:
    team: ${DAY_APPLE_TEAM}
    key-id: ${DAY_ASC_KEY_ID}
    issuer: ${DAY_ASC_ISSUER}
    key-path: ${DAY_ASC_KEY} # App Store Connect API key (.p8)
  android:
    keystore: ${DAY_ANDROID_KEYSTORE} # path to the upload keystore
    key-alias: ${DAY_ANDROID_KEY_ALIAS}
    store-pass: ${DAY_KS_PASS}
    key-pass: ${DAY_KEY_PASS}
  windows:
    provider: self-signed-dev # → azure-artifact-signing once an account exists (§16.5)
  ohos:
    keystore: ${DAY_OHOS_KEYSTORE} # .p12
    key-alias: ${DAY_OHOS_KEY_ALIAS}
    store-pass: ${DAY_OHOS_KS_PASS}
    key-pass: ${DAY_OHOS_KEY_PASS}
    cert: ${DAY_OHOS_CERT} # release .cer
    profile: ${DAY_OHOS_PROFILE} # .p7b
