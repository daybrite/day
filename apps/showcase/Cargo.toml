[package]
name = "showcase"
version.workspace = true
edition.workspace = true
rust-version.workspace = true

[features]
appkit = ["day/appkit", "day-piece-combobox/appkit"]
gtk = ["day/gtk", "day-piece-combobox/gtk"]
qt = ["day/qt", "day-piece-combobox/qt"]
uikit = ["day/uikit", "day-piece-combobox/uikit"]
widget = ["day/widget", "day-piece-combobox/widget"]
winui = ["day/winui", "day-piece-combobox/winui"]
mock = ["day/mock"]

# rlib for the desktop bin; the iOS staticlib and Android cdylib are requested explicitly by
# the mobile pipeline via `cargo rustc --crate-type` (day-cli mobile.rs). Keeping cdylib here
# would make every desktop build emit it too — and a Rust cdylib blows past the PE export cap
# on the windows-gnu ABI (windows-gtk / windows-qt): "too many exported symbols, max 65535".
[lib]
crate-type = ["rlib"]

[dependencies]
day = { workspace = true }
day-piece-combobox = { workspace = true }

[[bin]]
name = "showcase"
path = "src/main.rs"
