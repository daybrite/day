[package]
name = "matrix-core"
version.workspace = true
edition.workspace = true
rust-version.workspace = true

# The matrix-rust-sdk bridge (headless): owns a tokio runtime + matrix_sdk::Client, drives sync via
# matrix-sdk-ui, and publishes app-facing state (rooms, timeline, sync status) as Day reactive Signals
# updated on the main thread via day_reactive::on_main. UI actions spawn tokio work; results marshal
# back. See ../DESIGN.md ("Bridge pattern") and ../docs/matrix-sdk-0.14-cheatsheet.md.

[dependencies]
day-reactive = { path = "../../../crates/day-reactive" }

matrix-sdk = { version = "0.14", default-features = false, features = ["e2e-encryption", "sqlite", "rustls-tls"] }
matrix-sdk-ui = { version = "0.14", default-features = false, features = ["rustls-tls"] }
# Force static SQLite (compiled from C) so Android links without a system -lsqlite3 (see DESIGN.md).
libsqlite3-sys = { version = "0.35", features = ["bundled"] }

tokio = { version = "1", features = ["rt-multi-thread", "sync", "macros", "time"] }
futures-util = "0.3"
eyeball-im = "0.7"

serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# On Android the SQLite/crypto store must live in the app sandbox (there is no usable $HOME). We reach
# the app's files dir through day-android's JNI bridge (DayBridge.filesDirPath → Context.getFilesDir).
# Only linked for the Android target; day-android is an empty crate elsewhere. matrix already pulls
# day-android in transitively (the remote-image/textarea pieces' `mdc` feature), so this is no new
# code on the Android build — just a direct handle to `with_env`.
[target.'cfg(target_os = "android")'.dependencies]
day-android = { path = "../../../toolkits/day-android" }
