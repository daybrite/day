[package]
name = "day-winui"
publish = false
version.workspace = true
edition.workspace = true
rust-version.workspace = true
description.workspace = true
repository.workspace = true
license.workspace = true

# day-winui — the Windows backend (target `windows-winui`; DESIGN.md §1, §9), over the
# day-winui-sys C++/WinRT shim. `Handle = *mut UIElement`; real Windows.UI.Xaml controls
# (TextBlock / Button / ToggleSwitch / Slider / TextBox / ComboBox / Canvas) hosted via XAML
# Islands. day owns layout: absolute frames inside XAML Canvases (Canvas.Left/Top + size).
#
# System XAML (Windows.UI.Xaml) needs no Windows App SDK / MSIX, so it builds and launches
# locally with just cargo + MSVC. True WinUI 3 (Microsoft.UI.Xaml) would layer on behind this
# same shim once the App SDK bootstrap lands (DESIGN §9).

[dependencies]
day-spec = { workspace = true }
# Tweaks (docs/tweaks.md): the ext module reads the realized tree (day-core) and
# extends Decorate (day-pieces) with this toolkit\'s tweak modifier.
day-core = { workspace = true }
day-pieces = { workspace = true }
linkme = { workspace = true }

[target.'cfg(windows)'.dependencies]
day-winui-sys = { workspace = true }
