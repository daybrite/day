[package]
name = "day-arkui"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
description.workspace = true
repository.workspace = true
license.workspace = true

[dependencies]
day-spec = { workspace = true }
# Tweaks (docs/tweaks.md): the ext module reads the realized tree (day-core) and
# extends Decorate (day-pieces) with this toolkit\'s tweak modifier.
day-core = { workspace = true }
day-pieces = { workspace = true }
linkme = { workspace = true }

# The ArkUI/NAPI shim links on-device runtime libs, so it's only pulled in for HarmonyOS builds.
[target.'cfg(target_env = "ohos")'.dependencies]
day-arkui-sys = { workspace = true }
