[package]
name = "day-android"
publish = false
version.workspace = true
edition.workspace = true
rust-version.workspace = true
description.workspace = true
repository.workspace = true
license.workspace = true

[dependencies]
day-spec = { workspace = true }
# Tweaks (docs/tweaks.md): the ext module reads the realized tree (day-core) and
# extends Decorate (day-pieces) with this toolkit\'s tweak modifier.
day-core = { workspace = true }
day-pieces = { workspace = true }
linkme = { workspace = true }

[target.'cfg(target_os = "android")'.dependencies]
# jni 0.22 redesign: JNIEnv split into `Env`/`EnvUnowned`, `GlobalRef` → `Global<T>`, scoped
# `attach_current_thread(callback)`, and `call_*`/`find_class` take typed name/signature (JNIStr /
# MethodSignature) rather than `&str`. The `jni compat` helpers in lib.rs adapt the &str ergonomics.
jni = "0.22"
