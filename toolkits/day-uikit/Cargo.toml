[package]
name = "day-uikit"
publish = false
version.workspace = true
edition.workspace = true
rust-version.workspace = true
description.workspace = true
repository.workspace = true
license.workspace = true

[dependencies]
day-spec = { workspace = true }
# Tweaks (docs/tweaks.md): the ext module reads the realized tree (day-core) and
# extends Decorate (day-pieces) with this toolkit\'s tweak modifier.
day-core = { workspace = true }
day-pieces = { workspace = true }
linkme = { workspace = true }

[target.'cfg(target_os = "ios")'.dependencies]
objc2 = "0.6"
block2 = "0.6"
dispatch2 = "0.3"
objc2-foundation = { version = "0.3", features = ["NSString", "NSArray", "NSBundle", "NSDictionary", "NSPathUtilities", "NSURL", "NSIndexPath", "NSRunLoop", "NSDate", "NSObjCRuntime"] }
objc2-core-foundation = { version = "0.3", features = ["CFCGTypes"] }
objc2-core-graphics = { version = "0.3", features = ["CGContext", "CGGradient", "CGColorSpace"] }
objc2-ui-kit = { version = "0.3", features = [
    "UIApplication", "UIResponder", "UIView", "UIWindow", "UIScreen", "UIViewController",
    "UIButtonConfiguration", "UIBackgroundConfiguration",
    "UILabel", "UIControl", "UIButton", "UITextField", "UISwitch", "UISlider", "UIColor",
    "UIAlertController",
    "UIProgressView", "UIActivityIndicatorView",
    "UIScrollView", "UIAccessibility", "UIBezierPath", "UIImage", "UIImageView", "UITraitCollection", "NSAttributedString", "NSStringDrawing", "UIStringDrawing", "UIFont",
    "UINavigationController", "UINavigationBar", "UINavigationItem",
    "UITabBarController", "UITabBar", "UITabBarItem",
    "UITableView", "UITableViewCell", "UILabel",
    "UIGraphics", "UIGestureRecognizer", "UITapGestureRecognizer", "UIPanGestureRecognizer",
    "UIMenu", "UIMenuElement", "UIAction", "UICommand", "UIContextMenuInteraction",
    "UIContextMenuConfiguration", "UIInteraction", "UIKeyCommand",
    "UIDocumentPickerViewController", "UIViewControllerTransitionCoordinator",
    "objc2-core-foundation", "objc2-core-graphics",
] }
