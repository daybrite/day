[package]
name = "day-uikit"
version.workspace = true
edition.workspace = true
rust-version.workspace = true

[dependencies]
day-spec = { workspace = true }
linkme = { workspace = true }

[target.'cfg(target_os = "ios")'.dependencies]
objc2 = "0.6"
block2 = "0.6"
dispatch2 = "0.3"
objc2-foundation = { version = "0.3", features = ["NSString", "NSArray", "NSBundle", "NSDictionary", "NSPathUtilities", "NSURL", "NSIndexPath"] }
objc2-core-foundation = { version = "0.3", features = ["CFCGTypes"] }
objc2-core-graphics = { version = "0.3", features = ["CGContext"] }
objc2-ui-kit = { version = "0.3", features = [
    "UIApplication", "UIResponder", "UIView", "UIWindow", "UIScreen", "UIViewController",
    "UILabel", "UIControl", "UIButton", "UITextField", "UISwitch", "UISlider", "UIColor",
    "UIAlertController",
    "UIProgressView", "UIActivityIndicatorView",
    "UIScrollView", "UIAccessibility", "UIBezierPath", "UIImage", "UIImageView", "NSAttributedString", "NSStringDrawing", "UIStringDrawing", "UIFont",
    "UINavigationController", "UINavigationBar", "UINavigationItem",
    "UITabBarController", "UITabBar", "UITabBarItem",
    "UITableView", "UITableViewCell", "UILabel",
    "UIGraphics", "UIGestureRecognizer", "UITapGestureRecognizer", "UIPanGestureRecognizer",
    "UIMenu", "UIMenuElement", "UIAction", "UICommand", "UIContextMenuInteraction",
    "UIContextMenuConfiguration", "UIInteraction", "UIKeyCommand",
    "objc2-core-foundation", "objc2-core-graphics",
] }
