[package]
name = "day-gtk"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
description.workspace = true
repository.workspace = true
license.workspace = true

[dependencies]
day-spec = { workspace = true }
# Tweaks (docs/tweaks.md): the ext module reads the realized tree (day-core) and
# extends Decorate (day-pieces) with this toolkit\'s tweak modifier.
day-core = { workspace = true }
day-pieces = { workspace = true }
linkme = { workspace = true }
gtk4 = { version = "0.11", features = ["v4_10"] }
# libadwaita: the desktop navigation paradigm (AdwNavigationSplitView / AdwNavigationView),
# AdwApplicationWindow + AdwToolbarView chrome, AdwViewStack/AdwViewSwitcher tabs, and
# AdwAlertDialog. v1_5 gates AdwAlertDialog; it is the version shipped by Ubuntu 24.04, so CI
# stays green (AdwSpinner would need v1_7, which 24.04 lacks — GtkSpinner is kept instead).
libadwaita = { version = "0.9", features = ["v1_5"] }

# Dock icon (§18.2): GTK4 has no NSApplication integration, so on macOS the app icon is applied
# straight through AppKit (an unbundled binary otherwise shows the generic exe icon in the Dock).
[target.'cfg(target_os = "macos")'.dependencies]
objc2 = "0.6"
objc2-foundation = { version = "0.3", features = ["NSString"] }
objc2-app-kit = { version = "0.3", features = ["NSApplication", "NSResponder", "NSImage"] }
