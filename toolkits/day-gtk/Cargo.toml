[package]
name = "day-gtk"
version.workspace = true
edition.workspace = true
rust-version.workspace = true

[dependencies]
day-spec = { workspace = true }
linkme = { workspace = true }
gtk4 = { version = "0.11", features = ["v4_10"] }
# libadwaita: the desktop navigation paradigm (AdwNavigationSplitView / AdwNavigationView),
# AdwApplicationWindow + AdwToolbarView chrome, AdwViewStack/AdwViewSwitcher tabs, and
# AdwAlertDialog. v1_5 gates AdwAlertDialog; it is the version shipped by Ubuntu 24.04, so CI
# stays green (AdwSpinner would need v1_7, which 24.04 lacks — GtkSpinner is kept instead).
libadwaita = { version = "0.9", features = ["v1_5"] }
