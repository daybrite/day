[package]
name = "day-piece-pullrefresh"
publish = false
version.workspace = true
edition.workspace = true
rust-version.workspace = true
description.workspace = true
repository.workspace = true
license.workspace = true
build = "build.rs"

# A standalone Day Piece adding pull-to-refresh to any scrollable (`scroll(...)` or `list(...)`) —
# modeled on SwiftUI's `refreshable(action:)`. NATIVE where the toolkit has a real implementation
# (UIRefreshControl on iOS, AndroidX SwipeRefreshLayout on Android, ARKUI_NODE_REFRESH on
# HarmonyOS), EMULATED elsewhere (a spinner overlay driven by the `refreshing` signal, plus
# overscroll-gesture detection on AppKit — elastic scroll — and GTK — `edge-overshot`; Qt/WinUI are
# spinner + programmatic in v1). Also the reference for CONTAINER pieces: the first external piece
# that hosts a Day child inside its own native view (docs/extending.md).

[features]
appkit = ["dep:day-appkit", "dep:objc2", "dep:objc2-app-kit", "dep:objc2-foundation", "dep:block2"]
gtk = ["dep:day-gtk", "dep:gtk4"]
uikit = ["dep:day-uikit", "dep:objc2", "dep:objc2-ui-kit", "dep:objc2-foundation"]
mdc = ["dep:day-android"]        # + [package.metadata.day.android]
arkui = ["dep:day-arkui", "dep:day-arkui-sys"]  # + build.rs compiles src/refresh-arkui.cpp

# Backends this piece carries native-side code for. `day build` unions `<pkg>/<backend>` into an app
# build (Tier A.2). Qt / WinUI / mock are deliberately ABSENT: with no feature enabled the piece
# takes its pure-composition emulated path (overlay spinner, programmatic refresh), which needs no
# native code at all.
[package.metadata.day.piece]
backends = ["appkit", "gtk", "uikit", "mdc", "arkui"]

[dependencies]
day-spec = { workspace = true }
day-core = { workspace = true }
day-pieces = { workspace = true }
day-reactive = { workspace = true }
linkme = { workspace = true }
day-appkit = { workspace = true, optional = true }
day-gtk = { workspace = true, optional = true }
day-uikit = { workspace = true, optional = true }
day-android = { workspace = true, optional = true }
day-arkui = { workspace = true, optional = true }
day-arkui-sys = { workspace = true, optional = true }
gtk4 = { version = "0.11", optional = true }
block2 = { version = "0.6", optional = true }
objc2 = { version = "0.6", optional = true }
objc2-app-kit = { version = "0.3", optional = true, features = ["NSView", "NSResponder", "NSScrollView", "NSClipView"] }
objc2-ui-kit = { version = "0.3", optional = true, features = ["UIView", "UIResponder", "UIScrollView", "UIControl", "UIRefreshControl"] }
objc2-foundation = { version = "0.3", optional = true, features = ["NSString", "NSNotification"] }

[build-dependencies]
day-toolchain = { workspace = true }
cc = "1"

[dev-dependencies]
day-mock = { workspace = true }

# Standalone-piece Android contribution (docs/extending.md): the SwipeRefreshLayout subclass ships
# with THIS crate; the AndroidX artifact is added to the app's Gradle build by `day build` — no
# scaffold edits.
[package.metadata.day.android]
java = ["android/java"]
gradle-dependencies = ["androidx.swiperefreshlayout:swiperefreshlayout:1.1.0"]
gradle-repositories = []
permissions = []
