[package]
name = "day-piece-remote-image"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
build = "build.rs"

# An EXTERNAL Day Piece (DESIGN.md §15): a NATIVE image view that DECODES encoded bytes (PNG/JPEG)
# supplied REACTIVELY — the source of a Matrix client's avatars and inline image messages. The app
# fetches `mxc://` bytes off-thread via the SDK and pushes them into a `Signal<Option<Arc<Vec<u8>>>>`;
# this piece renders bytes → native image (NSImage / UIImage / GdkTexture / QPixmap / Bitmap /
# BitmapImage), with a placeholder rectangle while the source is `None` or a decode fails. Like the
# other standalone pieces it carries BOTH its front-end (Rust) and its per-toolkit backend (objc2 /
# gtk-rs / C++ shim / Android Java) with ZERO edits to any core day crate. See docs/extending.md.

[features]
appkit = ["dep:day-appkit", "dep:objc2", "dep:objc2-app-kit", "dep:objc2-foundation"]
gtk = ["dep:day-gtk", "dep:gtk4"]
qt = ["dep:day-qt"]                 # + build.rs compiles src/lib-qt-shim.cpp (QWidget + QPixmap), Qt libs linked by day-qt-sys
uikit = ["dep:day-uikit", "dep:objc2", "dep:objc2-ui-kit", "dep:objc2-foundation", "dep:objc2-core-foundation"]
widget = ["dep:day-android"]        # + [package.metadata.day.android] carries the DayRemoteImage Java factory
# WinUI: build.rs compiles src/lib-winui-shim.cpp (an Image/Ellipse boxed via day-winui-sys's
# day_winui_box seam, like the picker/media winui pieces). Windows-only, built in CI, NOT verified
# locally (see the caveat at the top of lib-winui-shim.cpp). mock has no renderer — its feature
# exists so apps can enable `day-piece-remote-image/mock` uniformly; the kind then falls back to
# day's placeholder leaf.
winui = ["dep:day-winui", "dep:day-winui-sys"]
mock = []

[dependencies]
day-spec = { workspace = true }
day-core = { workspace = true }
day-pieces = { workspace = true }
day-reactive = { workspace = true }
linkme = { workspace = true }
day-appkit = { workspace = true, optional = true }
day-gtk = { workspace = true, optional = true }
day-qt = { workspace = true, optional = true }
day-uikit = { workspace = true, optional = true }
day-android = { workspace = true, optional = true }
day-winui = { workspace = true, optional = true }
day-winui-sys = { workspace = true, optional = true }
gtk4 = { version = "0.11", optional = true }
objc2 = { version = "0.6", optional = true }
objc2-app-kit = { version = "0.3", optional = true, features = ["NSView", "NSResponder", "NSImage", "NSColor", "NSBezierPath", "NSGraphics"] }
objc2-foundation = { version = "0.3", optional = true, features = ["NSString", "NSData", "NSGeometry"] }
objc2-core-foundation = { version = "0.3", optional = true, features = ["CFCGTypes"] }
objc2-ui-kit = { version = "0.3", optional = true, features = ["UIView", "UIResponder", "UIImage", "UIImageView", "UIColor"] }

[build-dependencies]
cc = "1"

[dev-dependencies]
day-mock = { workspace = true }

# Standalone-piece Android contribution (docs/extending.md): the day CLI reads this from
# `cargo metadata` and folds it into the app's Gradle build — the piece carries its own backend
# Java (dev.daybrite.day.piece.remoteimage.DayRemoteImage), with ZERO edits to day-android. A plain
# ImageView + BitmapFactory needs no Gradle dependency or manifest permission (the app fetches the
# bytes itself and pushes them in; this piece only decodes+draws them).
[package.metadata.day.android]
# Java/Kotlin source dir(s), relative to this crate root — added as Gradle `java.srcDir`s.
java = ["android/java"]
# Gradle dependency coordinates added to the app module (none — ImageView is a framework widget).
gradle-dependencies = []
# Extra Maven repositories (URLs) for dependencies not on google()/mavenCentral().
gradle-repositories = []
