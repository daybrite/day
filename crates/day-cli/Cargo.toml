[package]
name = "day-cli"
version.workspace = true
edition.workspace = true
rust-version.workspace = true

[[bin]]
name = "day"
path = "src/main.rs"

[dependencies]
clap = { version = "4.6", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_norway = "0.9"
serde_json = "1"
sha2 = "0.10"
# Shared host-toolchain/SDK discovery (docs/environment.md) — same code the build scripts use.
day-toolchain = { workspace = true }
day-script = { workspace = true }
# Font name-table parsing + family→ident rules (§18.4) — the SAME code the runtimes use, so the
# names the stagers derive always match what the backends look up.
day-spec = { workspace = true }

# Ctrl-C child cleanup uses POSIX signals only (Windows relies on console propagation).
[target.'cfg(unix)'.dependencies]
libc = "0.2"
