# Release packaging (DESIGN.md §16.5, §20): on a version tag, `day pack` every releasable target
# of the showcase app and attach the artifacts + SHA256SUMS to a draft GitHub Release.
#
# Signing tiers (§20): with no repository secrets every artifact is DEV-SIGNED (ad-hoc / dev
# keystore / self-signed) and the pack output says so loudly. Populating the DAY_* secrets below
# lights up release signing with no workflow changes — the env plumbing already passes them through
# to day.yaml's ${DAY_*} references (empty secrets degrade, §20):
#   macOS/iOS : DAY_APPLE_CERT_P12 + DAY_APPLE_CERT_PASSWORD (base64 Developer ID .p12),
#               DAY_SIGN_MACOS_IDENTITY, DAY_NOTARY_KEY_ID, DAY_NOTARY_ISSUER, DAY_NOTARY_KEY_B64,
#               DAY_APPLE_TEAM, DAY_ASC_KEY_ID, DAY_ASC_ISSUER, DAY_ASC_KEY_B64
#   Android   : DAY_ANDROID_KEYSTORE_B64, DAY_ANDROID_KEY_ALIAS, DAY_KS_PASS, DAY_KEY_PASS
#   Windows   : (dev cert until an Azure Artifact Signing account exists — day.yaml provider)
#   OHOS      : DAY_OHOS_KEYSTORE_B64, DAY_OHOS_KEY_ALIAS, DAY_OHOS_KS_PASS, DAY_OHOS_KEY_PASS,
#               DAY_OHOS_CERT_B64, DAY_OHOS_PROFILE_B64
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # --- macOS: .dmg (appkit) + .ipa / sim-.app.zip (uikit) --------------------
  pack-macos:
    name: pack (macos + ios)
    runs-on: macos-15
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"
      DAY_SIGN_MACOS_IDENTITY: ${{ secrets.DAY_SIGN_MACOS_IDENTITY }}
      DAY_NOTARY_KEY_ID: ${{ secrets.DAY_NOTARY_KEY_ID }}
      DAY_NOTARY_ISSUER: ${{ secrets.DAY_NOTARY_ISSUER }}
      DAY_APPLE_TEAM: ${{ secrets.DAY_APPLE_TEAM }}
      DAY_ASC_KEY_ID: ${{ secrets.DAY_ASC_KEY_ID }}
      DAY_ASC_ISSUER: ${{ secrets.DAY_ASC_ISSUER }}
      HAS_APPLE_CERT: ${{ secrets.DAY_APPLE_CERT_P12 != '' }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build the day CLI
        run: cargo build --locked --release -p day-cli
      - name: Import the Developer ID certificate
        if: env.HAS_APPLE_CERT == 'true'
        uses: apple-actions/import-codesign-certs@v5
        with:
          p12-file-base64: ${{ secrets.DAY_APPLE_CERT_P12 }}
          p12-password: ${{ secrets.DAY_APPLE_CERT_PASSWORD }}
      - name: Materialize API keys (.p8)
        env:
          NOTARY_KEY_B64: ${{ secrets.DAY_NOTARY_KEY_B64 }}
          ASC_KEY_B64: ${{ secrets.DAY_ASC_KEY_B64 }}
        run: |
          if [ -n "$NOTARY_KEY_B64" ]; then
            echo "$NOTARY_KEY_B64" | base64 --decode > "$RUNNER_TEMP/notary.p8"
            echo "DAY_NOTARY_KEY=$RUNNER_TEMP/notary.p8" >> "$GITHUB_ENV"
          fi
          if [ -n "$ASC_KEY_B64" ]; then
            echo "$ASC_KEY_B64" | base64 --decode > "$RUNNER_TEMP/asc.p8"
            echo "DAY_ASC_KEY=$RUNNER_TEMP/asc.p8" >> "$GITHUB_ENV"
          fi
      - name: Pack (macos-appkit → dmg)
        working-directory: apps/showcase
        run: ../../target/release/day pack -p macos-appkit --format json
      - name: Pack (ios-uikit)
        working-directory: apps/showcase
        run: ../../target/release/day pack -p ios-uikit --format json
      - uses: actions/upload-artifact@v7
        with:
          name: dist-macos
          path: apps/showcase/build/day/dist/
          if-no-files-found: error

  # --- Linux: .flatpak bundles (gtk + qt) -------------------------------------
  pack-linux:
    name: pack (linux flatpaks)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install toolkit + flatpak tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-dev libadwaita-1-dev libwebkitgtk-6.0-dev \
            qt6-base-dev qt6-webengine-dev pkg-config \
            flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
      - name: Build the day CLI
        run: cargo build --locked --release -p day-cli
      - name: Pack (linux-gtk + linux-qt → flatpak)
        working-directory: apps/showcase
        run: |
          ../../target/release/day pack -p linux-gtk --format json
          ../../target/release/day pack -p linux-qt --format json
      - uses: actions/upload-artifact@v7
        with:
          name: dist-linux
          path: apps/showcase/build/day/dist/
          if-no-files-found: error

  # --- Android: release .apk + .aab --------------------------------------------
  pack-android:
    name: pack (android)
    runs-on: ubuntu-24.04
    env:
      DAY_ANDROID_KEY_ALIAS: ${{ secrets.DAY_ANDROID_KEY_ALIAS }}
      DAY_KS_PASS: ${{ secrets.DAY_KS_PASS }}
      DAY_KEY_PASS: ${{ secrets.DAY_KEY_PASS }}
      DAY_ANDROID_ABI: arm64-v8a
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "9.6.1"
          add-job-summary: "never"
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-ndk
      - name: Build the day CLI
        run: |
          cargo build --locked --release -p day-cli
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME" >> "$GITHUB_ENV"
      - name: Materialize the upload keystore
        env:
          KEYSTORE_B64: ${{ secrets.DAY_ANDROID_KEYSTORE_B64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 --decode > "$RUNNER_TEMP/upload.keystore"
            echo "DAY_ANDROID_KEYSTORE=$RUNNER_TEMP/upload.keystore" >> "$GITHUB_ENV"
          fi
      - name: Pack (android-widget → apk + aab)
        working-directory: apps/showcase
        run: ../../target/release/day pack -p android-widget --format json
      - uses: actions/upload-artifact@v7
        with:
          name: dist-android
          path: apps/showcase/build/day/dist/
          if-no-files-found: error

  # --- Windows: .msix + NSIS -setup.exe ----------------------------------------
  pack-windows:
    name: pack (windows)
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y --no-progress
      - name: Build the day CLI
        run: cargo build --locked --release -p day-cli
      - name: Pack (windows-winui → msix + setup.exe)
        working-directory: apps/showcase
        run: ../../target/release/day pack -p windows-winui --format json
      - uses: actions/upload-artifact@v7
        with:
          name: dist-windows
          path: apps/showcase/build/day/dist/
          if-no-files-found: error

  # --- OHOS: .hap ------------------------------------------------------------------
  # Mirrors ci.yml's SDK/CLT setup (see the ohos-arkui job there for the full rationale).
  pack-ohos:
    name: pack (ohos)
    runs-on: ubuntu-24.04
    env:
      CLT_VERSION: "5.1.0.840"
      CLT_URL: "https://repo.huaweicloud.com/harmonyos/ohpm/5.1.0/commandline-tools-linux-x64-5.1.0.840.zip"
      DAY_OHOS_KEY_ALIAS: ${{ secrets.DAY_OHOS_KEY_ALIAS }}
      DAY_OHOS_KS_PASS: ${{ secrets.DAY_OHOS_KS_PASS }}
      DAY_OHOS_KEY_PASS: ${{ secrets.DAY_OHOS_KEY_PASS }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-ohos
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      # SDK / CLT setup mirrors ci.yml's ohos-arkui job exactly (see the rationale there).
      - uses: openharmony-rs/setup-ohos-sdk@v1
        id: ohos-sdk
        with:
          version: "6.1"
      - name: Put the OHOS toolchains on PATH + point OHOS_NDK_HOME at the NDK
        run: |
          NATIVE="${{ steps.ohos-sdk.outputs.ohos_sdk_native }}"
          echo "$(dirname "$NATIVE")/toolchains" >> "$GITHUB_PATH"
          echo "OHOS_NDK_HOME=$NATIVE" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_OHOS_LINKER=$NATIVE/llvm/bin/aarch64-unknown-linux-ohos-clang" >> "$GITHUB_ENV"
      - name: Cache the OpenHarmony command-line-tools (hvigor / ohpm / signing)
        uses: actions/cache@v4
        with:
          path: ~/ohos-clt
          key: ohos-clt-${{ env.CLT_VERSION }}
      - name: Install hvigor from the command-line-tools
        run: |
          set -euo pipefail
          C="$HOME/ohos-clt/command-line-tools"
          if [ ! -x "$C/bin/hvigorw" ]; then
            mkdir -p ~/ohos-clt && cd ~/ohos-clt
            curl -fSL -o clt.zip "$CLT_URL"
            unzip -q -o clt.zip && rm -f clt.zip
            chmod -R +x "$C/bin" "$C/tool/node/bin" \
              "$C/sdk/default/openharmony/toolchains" 2>/dev/null || true
          fi
          echo "DEVECO_SDK_HOME=$C/sdk" >> "$GITHUB_ENV"
          { echo "$C/bin"; echo "$C/tool/node/bin"; } >> "$GITHUB_PATH"
      - name: Assemble a versioned OpenHarmony SDK for hvigor (OHOS_BASE_SDK_HOME)
        run: |
          set -euo pipefail
          OH="$HOME/ohos-clt/command-line-tools/sdk/default/openharmony"
          BASE="$HOME/ohos-ohsdk"
          mkdir -p "$BASE"
          ln -sfn "$OH" "$BASE/18"
          echo "OHOS_BASE_SDK_HOME=$BASE" >> "$GITHUB_ENV"
      - name: Build the day CLI
        run: cargo build --locked --release -p day-cli
      - name: Materialize OHOS signing material
        env:
          KEYSTORE_B64: ${{ secrets.DAY_OHOS_KEYSTORE_B64 }}
          CERT_B64: ${{ secrets.DAY_OHOS_CERT_B64 }}
          PROFILE_B64: ${{ secrets.DAY_OHOS_PROFILE_B64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 --decode > "$RUNNER_TEMP/ohos.p12"
            echo "DAY_OHOS_KEYSTORE=$RUNNER_TEMP/ohos.p12" >> "$GITHUB_ENV"
          fi
          if [ -n "$CERT_B64" ]; then
            echo "$CERT_B64" | base64 --decode > "$RUNNER_TEMP/ohos.cer"
            echo "DAY_OHOS_CERT=$RUNNER_TEMP/ohos.cer" >> "$GITHUB_ENV"
          fi
          if [ -n "$PROFILE_B64" ]; then
            echo "$PROFILE_B64" | base64 --decode > "$RUNNER_TEMP/ohos.p7b"
            echo "DAY_OHOS_PROFILE=$RUNNER_TEMP/ohos.p7b" >> "$GITHUB_ENV"
          fi
      - name: Pack (ohos-arkui → hap)
        working-directory: apps/showcase
        env:
          DAY_OHOS_ARCH: arm64
        run: ../../target/release/day pack -p ohos-arkui --format json
      - uses: actions/upload-artifact@v7
        with:
          name: dist-ohos
          path: apps/showcase/build/day/dist/
          if-no-files-found: error

  # --- Draft GitHub Release with every package + SHA256SUMS ----------------------
  release:
    name: draft release
    runs-on: ubuntu-latest
    needs: [pack-macos, pack-linux, pack-android, pack-windows, pack-ohos]
    if: ${{ !cancelled() && startsWith(github.ref, 'refs/tags/') }}
    steps:
      - uses: actions/checkout@v7
      - name: Download all packages
        uses: actions/download-artifact@v7
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true
      - name: Checksums
        working-directory: dist
        run: |
          sha256sum -- * > SHA256SUMS
          cat SHA256SUMS
      - name: Create the draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # ci.yml's release-cli job targets the same tag (the day CLI binaries + installers) —
          # whichever job runs first creates the draft release, the other uploads into it.
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 \
            || gh release create "$GITHUB_REF_NAME" --draft --verify-tag \
                 --title "Day $GITHUB_REF_NAME" --generate-notes
          gh release upload "$GITHUB_REF_NAME" dist/* --clobber
