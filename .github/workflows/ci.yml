# CI (DESIGN.md §20.1) — per-OS jobs, patterns lifted from pane's per-OS matrix and hop's
# screenshot pipeline. Banked toolchain knowledge encoded here from day one: JDK pinned to 21
# (never newer — the AGP jdk-image transform breaks), rustup toolchains for cross-std,
# GSK_RENDERER=cairo for headless GTK (set by `day launch` itself), `--locked` everywhere,
# emulator boot handled by the runner action's polling.
name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

#concurrency:
#  group: ci-${{ github.ref }}
#  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUST_BACKTRACE: full

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # `--workspace` cannot compile here: cargo feature unification would enable several `day`
  # backend features at once and trip the one-backend-per-binary compile_error! guard (§3).
  # Instead clippy runs once per backend feature selection; together the runs cover every
  # workspace crate that compiles on Linux (day-appkit/day-uikit are cfg-empty off their
  # platforms; the macos job lints those).
  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: aarch64-linux-android
      - uses: Swatinem/rust-cache@v2
      - name: Install GTK 4 and Qt 6 dev libraries
        run: |
          sudo apt-get update
          # WebKitGTK 6 (GTK web view) + Qt WebEngine (Qt web view) for day-piece-webview.
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-dev libadwaita-1-dev qt6-base-dev pkg-config \
            libwebkitgtk-6.0-dev qt6-webengine-dev
      - name: Clippy (host-portable crates)
        run: cargo clippy --locked --all-targets
      - name: Clippy (day CLI + dayscript)
        run: cargo clippy --locked -p day-cli -p day-script --all-targets
      - name: Clippy (gtk / qt / mock backends)
        run: |
          for feature in gtk qt mock; do
            cargo clippy --locked -p showcase --no-default-features --features "$feature" --all-targets
          done
      - name: Clippy (android backend, cross-check)
        run: |
          cargo clippy --locked --target aarch64-linux-android -p showcase --lib \
            --no-default-features --features widget
      # day-battery is headless (no toolkit feature) — lint its Linux + Android impls here; the
      # macOS/iOS/Windows impls compile as a showcase dependency on those jobs (RUSTFLAGS=-D warnings).
      - name: Clippy (day-battery, headless)
        run: |
          cargo clippy --locked -p day-battery --all-targets
          cargo clippy --locked --target aarch64-linux-android -p day-battery

  # ===========================================================================
  # Per-combo build+test+walkthrough jobs — one job per <platform>-<toolkit>.
  # Each: installs the toolkit's deps, tests the host-portable crates, builds and
  # launches the showcase for the combo, drives the dayscript walkthrough, and
  # uploads that combo's screenshots (screenshots-<combo>). Gated on the fast
  # checks (fmt/clippy/msrv). The apple/winui backends are cfg-empty on the ubuntu
  # clippy job, so those combos re-run clippy on their native runner.
  # ===========================================================================

  # --- macOS desktop: appkit / qt / gtk -------------------------------------
  macos:
    name: ${{ matrix.combo }}
    runs-on: macos-15
    needs: [fmt, clippy, msrv]
    strategy:
      fail-fast: false
      matrix:
        include:
          - { combo: macos-appkit, toolkit: appkit }
          - { combo: macos-qt, toolkit: qt }
          - { combo: macos-gtk, toolkit: gtk }
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install toolkit deps
        run: |
          case "${{ matrix.toolkit }}" in
            # The full `qt` formula includes Qt WebEngine (the Qt web view). macos-gtk gets NO
            # WebKitGTK — Homebrew's has no bottle and vends the GTK3 API, and WebKitGTK isn't viable
            # on macOS-quartz, so the GTK web view is Linux/Windows only (day-piece-webview).
            qt) brew install qt pkg-config ;;
            gtk) brew install gtk4 libadwaita pkg-config ;;
          esac
      - name: Test host-portable crates
        run: cargo test --locked
      - name: Clippy (appkit backend)
        if: matrix.toolkit == 'appkit'
        run: cargo clippy --locked -p showcase --no-default-features --features appkit --all-targets
      - name: Build day CLI
        run: cargo build --locked -p day-cli
      - name: Walkthrough (${{ matrix.combo }})
        working-directory: apps/showcase
        run: ../../target/debug/day launch -p ${{ matrix.combo }} --script scripts/walkthrough.yaml --locale fr
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: screenshots-${{ matrix.combo }}
          path: apps/showcase/build/day/screenshots/${{ matrix.combo }}
          if-no-files-found: warn

  # --- iOS Simulator: uikit -------------------------------------------------
  ios-uikit:
    name: ios-uikit
    runs-on: macos-15
    needs: [fmt, clippy, msrv]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          # The uikit backend cross-compiles via the Xcode script phase (§17.4).
          targets: aarch64-apple-ios-sim
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Test host-portable crates
        run: cargo test --locked
      - name: Clippy (uikit backend)
        run: |
          cargo clippy --locked --target aarch64-apple-ios-sim -p showcase --lib \
            --no-default-features --features uikit
      - name: Build day CLI
        run: cargo build --locked -p day-cli
      - name: Boot an iOS Simulator
        run: |
          UDID=$(xcrun simctl list devices available --json \
            | jq -r '[.devices[] | .[] | select(.name | test("^iPhone"))][0].udid')
          echo "booting $UDID"
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b
      - name: Walkthrough (ios-uikit)
        working-directory: apps/showcase
        run: ../../target/debug/day launch -p ios-uikit --script scripts/walkthrough.yaml --locale fr
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: screenshots-ios-uikit
          path: apps/showcase/build/day/screenshots/ios-uikit
          if-no-files-found: warn

  # --- Linux desktop: qt / gtk ----------------------------------------------
  linux:
    name: ${{ matrix.combo }}
    runs-on: ubuntu-24.04
    needs: [fmt, clippy, msrv]
    strategy:
      fail-fast: false
      matrix:
        include:
          - { combo: linux-qt, toolkit: qt }
          - { combo: linux-gtk, toolkit: gtk }
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install toolkit deps
        run: |
          sudo apt-get update
          # day-piece-webview needs Qt WebEngine (Qt) / WebKitGTK 6 (GTK) on top of the base libs.
          case "${{ matrix.toolkit }}" in
            qt) sudo apt-get install -y --no-install-recommends qt6-base-dev qt6-webengine-dev pkg-config ;;
            gtk) sudo apt-get install -y --no-install-recommends libgtk-4-dev libadwaita-1-dev libwebkitgtk-6.0-dev pkg-config xvfb ;;
          esac
      - name: Test host-portable crates
        run: cargo test --locked
      - name: Build day CLI
        run: cargo build --locked -p day-cli
      # GTK renders under a virtual display (in-process snapshot is limited on GTK, §9);
      # Qt runs on the offscreen platform. Both drive the full dayscript walkthrough.
      # The GTK web view (WebKitGTK) needs two env vars in this restricted headless runner:
      #   WEBKIT_DISABLE_SANDBOX_THIS_IS_DANGEROUS — the bubblewrap sandbox can't create a network
      #     namespace here ("bwrap: loopback: Failed RTM_NEWADDR: Operation not permitted"), which
      #     otherwise kills the WebKit web process and aborts the app.
      #   WEBKIT_DISABLE_COMPOSITING_MODE — xvfb has no GPU (libEGL/DRI3 warnings), so render the
      #     page in software instead of via accelerated (GL) compositing.
      - name: Walkthrough (${{ matrix.combo }})
        working-directory: apps/showcase
        run: |
          if [ "${{ matrix.toolkit }}" = gtk ]; then
            xvfb-run -a ../../target/debug/day launch -p linux-gtk \
              --script scripts/walkthrough.yaml --locale fr \
              --env WEBKIT_DISABLE_SANDBOX_THIS_IS_DANGEROUS=1 \
              --env WEBKIT_DISABLE_COMPOSITING_MODE=1
          else
            ../../target/debug/day launch -p linux-qt \
              --script scripts/walkthrough.yaml --locale fr \
              --env QT_QPA_PLATFORM=offscreen
          fi
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: screenshots-${{ matrix.combo }}
          path: apps/showcase/build/day/screenshots/${{ matrix.combo }}
          if-no-files-found: warn

  # --- Android emulator: widget ---------------------------------------------
  # Real emulator via KVM (reactivecircus). The Linux emulator is x86_64-only, so
  # the .so cross-builds for x86_64 via DAY_ANDROID_ABI. continue-on-error while
  # the known postMain flake (intermittent "main thread did not respond") is chased.
  android-widget:
    name: android-widget
    runs-on: ubuntu-24.04
    needs: [fmt, clippy, msrv]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "9.6.1"
          add-job-summary: "never"
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-ndk
      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Test host-portable crates
        run: cargo test --locked
      - name: Build day CLI
        run: |
          rustup target add x86_64-linux-android
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME" >> "$GITHUB_ENV"
          cargo build --locked -p day-cli
      - name: Emulator walkthrough (android-widget)
        uses: reactivecircus/android-emulator-runner@v2
        env:
          DAY_ANDROID_ABI: x86_64
        with:
          api-level: 34
          arch: x86_64
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          # The action runs each script line as its own `sh -c`, so `cd` must share the line.
          script: cd apps/showcase && ../../target/debug/day launch -p android-widget --script scripts/walkthrough.yaml --locale fr
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: screenshots-android-widget
          path: apps/showcase/build/day/screenshots/android-widget
          if-no-files-found: warn

  # --- HarmonyOS Next emulator: arkui ---------------------------------------
  # HarmonyOS has no AOSP layer; its UI framework is ArkUI. The day-arkui backend cross-compiles the
  # app to a native cdylib (libentry.so) that an ArkTS host loads and mounts into a NodeContent
  # (docs/harmonyos.md). This job ALWAYS does the verifiable half — fetch the OpenHarmony NDK and
  # cross-compile the full Day app for the emulator (x86_64) and device (arm64) — then TRIES the run
  # against a LOCALLY-INSTALLED and configured HarmonyOS emulator: package the .hap (DevEco's hvigor,
  # if present), `hdc install`, launch the ability, and snapshot. The .hap packager, signing profile,
  # and emulator ship with DevEco Studio and are gated behind a Huawei developer account, so the run
  # steps are best-effort — they no-op when no HarmonyOS target is connected (stock runner) and light
  # up on a self-hosted macOS runner that has DevEco + a booted emulator. continue-on-error keeps it
  # non-blocking meanwhile. A pre-set OHOS_NDK_HOME (a self-hosted DevEco SDK) skips the download.
  ohos-arkui:
    name: ohos-arkui
    runs-on: ubuntu-24.04
    needs: [fmt, clippy, msrv]
    continue-on-error: true
    env:
      # OpenHarmony command-line-tools: one self-contained bundle carrying the SDK/NDK, hvigor,
      # ohpm, a bundled node, hdc, and the default debug signing material — downloadable without a
      # Huawei developer account. This lets CI run a real hvigor build + sign the .hap headlessly.
      CLT_VERSION: "5.1.0.840"
      CLT_URL: "https://repo.huaweicloud.com/harmonyos/ohpm/5.1.0/commandline-tools-linux-x64-5.1.0.840.zip"
      APP_ID: "dev.daybrite.day.arkui.demo"
      HARMONY: apps/day-arkui-demo/harmony
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          # Tier-2 OHOS std targets: device (arm64) + emulator (x86_64). rustup provides the std.
          targets: aarch64-unknown-linux-ohos,x86_64-unknown-linux-ohos
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-java@v5
        # java + keytool for the headless hap signing (sign-hap.sh).
        with:
          distribution: temurin
          java-version: "21"
      - name: Cache the OpenHarmony command-line-tools (~2 GB)
        uses: actions/cache@v4
        with:
          path: ~/ohos-clt
          key: ohos-clt-${{ env.CLT_VERSION }}
      # The command-line-tools carry everything needed to build a .hap headlessly: the SDK/NDK
      # (native clang cross-linkers + ArkUI/NAPI headers + runtime libs), hvigor, ohpm, a bundled
      # node, hdc, and the default OpenHarmony debug signing material. Emits OHOS_NDK_HOME (for the
      # Rust cross-compile), DEVECO_SDK_HOME + PATH (for hvigor/ohpm/hdc), and the cargo linkers.
      - name: Install the OpenHarmony command-line-tools
        run: |
          set -euo pipefail
          C="$HOME/ohos-clt/command-line-tools"
          if [ ! -x "$C/bin/hvigorw" ]; then
            mkdir -p ~/ohos-clt && cd ~/ohos-clt
            curl -fSL -o clt.zip "$CLT_URL"
            unzip -q -o clt.zip && rm -f clt.zip
            chmod -R +x "$C/bin" "$C/tool/node/bin" \
              "$C/sdk/default/openharmony/toolchains" 2>/dev/null || true
          fi
          NDK="$C/sdk/default/openharmony/native"
          {
            echo "OHOS_NDK_HOME=$NDK"
            echo "DEVECO_SDK_HOME=$C/sdk"
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_OHOS_LINKER=$NDK/llvm/bin/aarch64-unknown-linux-ohos-clang"
            echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_OHOS_LINKER=$NDK/llvm/bin/x86_64-unknown-linux-ohos-clang"
          } >> "$GITHUB_ENV"
          {
            echo "$C/bin"
            echo "$C/tool/node/bin"
            echo "$C/sdk/default/openharmony/toolchains"
          } >> "$GITHUB_PATH"
      - name: Clippy (arkui backend, cross-check)
        run: cargo clippy --locked --target aarch64-unknown-linux-ohos -p day-arkui-demo -- -D warnings
      - name: Build day CLI
        run: cargo build --locked -p day-cli
      # The full Day app links to a loadable libentry.so for both arches, assembled into the ArkTS
      # host project's entry/libs/<abi>/, using the CLT's native NDK clang.
      - name: Cross-compile the app to libentry.so
        run: |
          "$HARMONY/build.sh" both
          file "$HARMONY/entry/libs/x86_64/libentry.so" \
               "$HARMONY/entry/libs/arm64-v8a/libentry.so"
      - name: Resolve ohpm dependencies
        working-directory: ${{ env.HARMONY }}
        run: |
          # The app's only dependency (the local libentry.so type) resolves offline; ohpm install
          # wires up oh_modules for hvigor. Non-fatal if the registry is unreachable.
          ohpm install || echo "ohpm install non-fatal (only a local dependency)"
      # THE CORE OF THIS JOB: hvigor assembles the .hap (compiles the ArkTS host, packs the native
      # libs + resources). Unsigned, because build-profile.json5 declares no signingConfig.
      - name: Build the .hap (hvigor assembleHap)
        working-directory: ${{ env.HARMONY }}
        run: |
          hvigorw assembleHap --mode module -p product=default -p buildMode=debug \
            --no-daemon --stacktrace
          echo "--- built .hap(s) ---"; find entry/build -name '*.hap'
      # Sign the unsigned .hap with the default OpenHarmony debug material bundled in the SDK (no
      # account / secrets). The generate-app-cert + sign-profile + sign-app chain is validated.
      - name: Sign the .hap
        working-directory: ${{ env.HARMONY }}
        run: |
          unsigned="$(find entry/build -name '*-unsigned.hap' | head -1)"
          [ -n "$unsigned" ] || unsigned="$(find entry/build -name '*.hap' | head -1)"
          [ -n "$unsigned" ] || { echo "hvigor produced no .hap; skipping sign"; exit 1; }
          ./sign-hap.sh "$unsigned" "entry/build/day-arkui-demo-signed.hap" "$APP_ID"
          ls -la entry/build/day-arkui-demo-signed.hap
      # Best-effort run against a locally-configured HarmonyOS emulator (self-hosted runner only;
      # GitHub-hosted runners have no HarmonyOS emulator).
      - name: Run on a locally-configured HarmonyOS emulator (if connected)
        run: |
          command -v hdc >/dev/null 2>&1 || { echo "hdc not on PATH — skipping run"; exit 0; }
          targets="$(hdc list targets 2>/dev/null | tr -d '[:space:]')"
          if [ -z "$targets" ] || [ "$targets" = "[Empty]" ]; then
            echo "no HarmonyOS target connected to hdc — skipping run"; exit 0
          fi
          hap="$(find "$HARMONY/entry/build" -name '*-signed.hap' | head -1)"
          hdc install "$hap"
          hdc shell aa start -b "$APP_ID" -a EntryAbility
          sleep 6
          mkdir -p "$HARMONY/../build/screenshots/ohos-arkui"
          hdc shell snapshot_display -f /data/local/tmp/day.png
          hdc file recv /data/local/tmp/day.png "$HARMONY/../build/screenshots/ohos-arkui/home.png"
      - name: Upload the signed .hap
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ohos-arkui-hap
          path: ${{ env.HARMONY }}/entry/build/**/*.hap
          if-no-files-found: ignore
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: screenshots-ohos-arkui
          path: apps/day-arkui-demo/build/screenshots/ohos-arkui
          if-no-files-found: ignore

  # --- Windows desktop: winui (MSVC) ----------------------------------------
  # winui uses MSVC + the Windows SDK cppwinrt headers (on windows-latest) and
  # captures via RenderTargetBitmap. It runs on the default `bash` shell. It is a
  # SEPARATE job from windows-qt / windows-gtk because those need the msys2 shell:
  # the `matrix` context is not available in a step's `shell:` field, so a single
  # matrix cannot switch shells per combo — the toolchains are split into two jobs.
  windows-winui:
    name: windows-winui
    runs-on: windows-latest
    needs: [fmt, clippy, msrv]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Test host-portable crates
        run: cargo test --locked
      - name: Clippy (winui backend)
        run: cargo clippy --locked -p showcase --no-default-features --features winui --all-targets
      # Lint the headless day-battery crate's Windows impl (GetSystemPowerStatus) on a real Windows host.
      - name: Clippy (day-battery, Windows impl)
        run: cargo clippy --locked -p day-battery --all-targets
      - name: Build day CLI
        run: cargo build --locked -p day-cli
      - name: Walkthrough (windows-winui)
        working-directory: apps/showcase
        run: ../../target/debug/day launch -p windows-winui --script scripts/walkthrough.yaml --locale fr
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: screenshots-windows-winui
          path: apps/showcase/build/day/screenshots/windows-winui
          if-no-files-found: warn

  # --- Windows desktop: qt / gtk (gnu toolchain + MSYS2) --------------------
  # windows-qt / windows-gtk use the gnu toolchain + MSYS2's MINGW64 GTK4/Qt6 +
  # pkgconf, built and run inside the msys2 shell (so pkg-config and the runtime
  # DLLs resolve). The whole job defaults to `msys2 {0}` — every `run:` step here is
  # a cargo build/test that must see MINGW64's pkgconf; the action-only setup steps
  # (checkout/toolchain/cache/setup-msys2) don't use the job shell, and setup-msys2
  # runs before the first `run:` step, so the shell exists when it's first needed.
  # `path-type: inherit` keeps the Windows PATH (rustup's cargo, the built day.exe)
  # visible while adding /mingw64/bin. windows-gtk's Rust build was confirmed locally
  # against MSYS2 GTK 4.22 (clangarm64/gnullvm); both stay experimental
  # (continue-on-error) until a full CI walkthrough is green on a real Windows host.
  windows-msys2:
    name: ${{ matrix.combo }}
    runs-on: windows-latest
    needs: [fmt, clippy, msrv]
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          # mingw-w64-x86_64-gcc provides the mingw gcc/g++ the pin step below points the linker
          # (and the cc crate) at — the runner has no MSYS2 mingw compiler otherwise, only the libs.
          # Neither web view has an MSYS2/MINGW64 package: no Qt6 WebEngine and no WebKitGTK 6 (both
          # embed a browser engine — Chromium / WebKit — that won't build with MinGW GCC). So
          # day-piece-webview degrades on both: the Qt view to a URL label (build.rs probes pkg-config
          # for Qt6WebEngineWidgets), the GTK view to day's placeholder leaf (webkit6 is gated off
          # Windows in Cargo.toml, exactly like macOS).
          - combo: windows-qt
            toolkit: qt
            msys_pkgs: mingw-w64-x86_64-gcc mingw-w64-x86_64-qt6-base mingw-w64-x86_64-pkgconf
          - combo: windows-gtk
            toolkit: gtk
            msys_pkgs: mingw-w64-x86_64-gcc mingw-w64-x86_64-gtk4 mingw-w64-x86_64-libadwaita mingw-w64-x86_64-pkgconf
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable-x86_64-pc-windows-gnu
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Set up MSYS2 (qt/gtk)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          path-type: inherit
          install: ${{ matrix.msys_pkgs }}
      # rustup's windows-gnu toolchain links via whatever `x86_64-w64-mingw32-gcc` is first on
      # PATH — on the runner that resolves to a *different* mingw (C:\mingw64) which lacks the
      # MSYS2 Qt6/GTK4/glib import libs, so `-lQt6Widgets` / `-lglib-2.0` fail to link. Force
      # MSYS2's mingw to the front of PATH and pin the linker + the `cc` crate's compiler (for the
      # C++ shims) to MSYS2's own gcc, so /mingw64/lib is searched. Forward-slash paths link cleanly.
      - name: Pin the MSYS2 mingw toolchain (finds MSYS2 Qt6/GTK4 libs)
        run: |
          cygpath -w "$MINGW_PREFIX/bin" >> "$GITHUB_PATH"
          GCC="$(cygpath -m "$MINGW_PREFIX/bin/gcc.exe")"
          echo "CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER=$GCC" >> "$GITHUB_ENV"
          echo "CC=$GCC" >> "$GITHUB_ENV"
          echo "CXX=$(cygpath -m "$MINGW_PREFIX/bin/g++.exe")" >> "$GITHUB_ENV"
      - name: Test host-portable crates
        run: cargo test --locked
      - name: Build day CLI
        run: cargo build --locked -p day-cli
      # WEBKIT_DISABLE_COMPOSITING_MODE is a harmless no-op on Windows now (neither combo has a real
      # web engine — Qt degrades to a label, GTK to a placeholder); kept so the invocation matches the
      # Linux GTK job, where the same var is load-bearing for the real WebKitGTK view.
      - name: Walkthrough (${{ matrix.combo }})
        working-directory: apps/showcase
        run: ../../target/debug/day launch -p ${{ matrix.combo }} --script scripts/walkthrough.yaml --locale fr --env WEBKIT_DISABLE_COMPOSITING_MODE=1
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: screenshots-${{ matrix.combo }}
          path: apps/showcase/build/day/screenshots/${{ matrix.combo }}
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # msrv: the declared minimum supported Rust (workspace rust-version) still
  # builds the host-portable crates (§20.5).
  # ---------------------------------------------------------------------------
  msrv:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.89.0"
      - uses: Swatinem/rust-cache@v2
      - name: Build at MSRV
        run: cargo build --locked

  # ---------------------------------------------------------------------------
  # deny: dependency advisories + duplicate-version bans (§20.5). Runs as its own
  # check; the build combos gate on [fmt, clippy, msrv], not deny — a newly
  # published RUSTSEC advisory against an existing dependency shouldn't block
  # unrelated builds. Add deny back to each combo's `needs:` to make it a hard gate.
  # ---------------------------------------------------------------------------
  deny:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans

  # ---------------------------------------------------------------------------
  # website: build the Astro site (website/) and deploy it to GitHub Pages at the custom
  # domain https://daybrite.dev (public/CNAME pins it). Runs AFTER every screenshot-producing job so
  # it can download their `screenshots-<combo>` artifacts and assemble the gallery
  # from the latest captures. `!cancelled()` (not `success()`) means a platform
  # that failed to produce screenshots does not block the deploy — the gallery
  # simply shows whatever platforms succeeded (the assembly emits placeholders for
  # the rest). Builds on every push/PR (validation); a separate job deploys only
  # from main so PRs never publish. Enable Pages via Settings → Pages → Source:
  # "GitHub Actions".
  # ---------------------------------------------------------------------------
  website:
    name: website (build)
    needs: [macos, ios-uikit, linux, android-widget, ohos-arkui, windows-winui, windows-msys2]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json
      - name: Download every platform's screenshots
        # Each screenshot job uploads `screenshots-<combo>`; grab them all into
        # website/artifacts/screenshots-<combo>/… where the assembly expects them.
        # continue-on-error: a run where no platform produced screenshots still deploys.
        uses: actions/download-artifact@v7
        continue-on-error: true
        with:
          pattern: screenshots-*
          path: website/artifacts
      - name: Build the site (assembles the gallery from the artifacts)
        working-directory: website
        run: |
          npm ci
          npm run build
      - name: Upload the Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: website/dist

  deploy-website:
    name: website (deploy)
    needs: website
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
