# CI (DESIGN.md §20.1) — per-OS jobs, patterns lifted from pane's per-OS matrix and hop's
# screenshot pipeline. Banked toolchain knowledge encoded here from day one: JDK pinned to 21
# (never newer — the AGP jdk-image transform breaks), rustup toolchains for cross-std,
# GSK_RENDERER=cairo for headless GTK (set by `day launch` itself), `--locked` everywhere,
# emulator boot handled by the runner action's polling.
name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

#concurrency:
#  group: ci-${{ github.ref }}
#  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUST_BACKTRACE: full

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # `--workspace` cannot compile here: cargo feature unification would enable several `day`
  # backend features at once and trip the one-backend-per-binary compile_error! guard (§3).
  # Instead clippy runs once per backend feature selection; together the runs cover every
  # workspace crate that compiles on Linux (day-appkit/day-uikit are cfg-empty off their
  # platforms; the macos job lints those).
  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: aarch64-linux-android
      - uses: Swatinem/rust-cache@v2
      - name: Install GTK 4 and Qt 6 dev libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgtk-4-dev qt6-base-dev pkg-config
      - name: Clippy (host-portable crates)
        run: cargo clippy --locked --all-targets
      - name: Clippy (day CLI + dayscript)
        run: cargo clippy --locked -p day-cli -p day-script --all-targets
      - name: Clippy (gtk / qt / mock backends)
        run: |
          for feature in gtk qt mock; do
            cargo clippy --locked -p showcase --no-default-features --features "$feature" --all-targets
          done
      - name: Clippy (android backend, cross-check)
        run: |
          cargo clippy --locked --target aarch64-linux-android -p showcase --lib \
            --no-default-features --features widget

  # ===========================================================================
  # Per-combo build+test+walkthrough jobs — one job per <platform>-<toolkit>.
  # Each: installs the toolkit's deps, tests the host-portable crates, builds and
  # launches the showcase for the combo, drives the dayscript walkthrough, and
  # uploads that combo's screenshots (screenshots-<combo>). Gated on the fast
  # checks (fmt/clippy/msrv). The apple/winui backends are cfg-empty on the ubuntu
  # clippy job, so those combos re-run clippy on their native runner.
  # ===========================================================================

  # --- macOS desktop: appkit / qt / gtk -------------------------------------
  macos:
    name: ${{ matrix.combo }}
    runs-on: macos-15
    needs: [fmt, clippy, msrv]
    strategy:
      fail-fast: false
      matrix:
        include:
          - { combo: macos-appkit, toolkit: appkit }
          - { combo: macos-qt, toolkit: qt }
          - { combo: macos-gtk, toolkit: gtk }
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install toolkit deps
        run: |
          case "${{ matrix.toolkit }}" in
            qt) brew install qt pkg-config ;;
            gtk) brew install gtk4 pkg-config ;;
          esac
      - name: Test host-portable crates
        run: cargo test --locked
      - name: Clippy (appkit backend)
        if: matrix.toolkit == 'appkit'
        run: cargo clippy --locked -p showcase --no-default-features --features appkit --all-targets
      - name: Build day CLI
        run: cargo build --locked -p day-cli
      - name: Walkthrough (${{ matrix.combo }})
        working-directory: apps/showcase
        run: ../../target/debug/day launch -p ${{ matrix.combo }} --script scripts/walkthrough.yaml --locale fr
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: screenshots-${{ matrix.combo }}
          path: apps/showcase/build/day/screenshots/${{ matrix.combo }}
          if-no-files-found: warn

  # --- iOS Simulator: uikit -------------------------------------------------
  ios-uikit:
    name: ios-uikit
    runs-on: macos-15
    needs: [fmt, clippy, msrv]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          # The uikit backend cross-compiles via the Xcode script phase (§17.4).
          targets: aarch64-apple-ios-sim
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Test host-portable crates
        run: cargo test --locked
      - name: Clippy (uikit backend)
        run: |
          cargo clippy --locked --target aarch64-apple-ios-sim -p showcase --lib \
            --no-default-features --features uikit
      - name: Build day CLI
        run: cargo build --locked -p day-cli
      - name: Boot an iOS Simulator
        run: |
          UDID=$(xcrun simctl list devices available --json \
            | jq -r '[.devices[] | .[] | select(.name | test("^iPhone"))][0].udid')
          echo "booting $UDID"
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b
      - name: Walkthrough (ios-uikit)
        working-directory: apps/showcase
        run: ../../target/debug/day launch -p ios-uikit --script scripts/walkthrough.yaml --locale fr
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: screenshots-ios-uikit
          path: apps/showcase/build/day/screenshots/ios-uikit
          if-no-files-found: warn

  # --- Linux desktop: qt / gtk ----------------------------------------------
  linux:
    name: ${{ matrix.combo }}
    runs-on: ubuntu-24.04
    needs: [fmt, clippy, msrv]
    strategy:
      fail-fast: false
      matrix:
        include:
          - { combo: linux-qt, toolkit: qt }
          - { combo: linux-gtk, toolkit: gtk }
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install toolkit deps
        run: |
          sudo apt-get update
          case "${{ matrix.toolkit }}" in
            qt) sudo apt-get install -y --no-install-recommends qt6-base-dev pkg-config ;;
            gtk) sudo apt-get install -y --no-install-recommends libgtk-4-dev pkg-config xvfb ;;
          esac
      - name: Test host-portable crates
        run: cargo test --locked
      - name: Build day CLI
        run: cargo build --locked -p day-cli
      # GTK renders under a virtual display (in-process snapshot is limited on GTK, §9);
      # Qt runs on the offscreen platform. Both drive the full dayscript walkthrough.
      - name: Walkthrough (${{ matrix.combo }})
        working-directory: apps/showcase
        run: |
          if [ "${{ matrix.toolkit }}" = gtk ]; then
            xvfb-run -a ../../target/debug/day launch -p linux-gtk \
              --script scripts/walkthrough.yaml --locale fr
          else
            ../../target/debug/day launch -p linux-qt \
              --script scripts/walkthrough.yaml --locale fr \
              --env QT_QPA_PLATFORM=offscreen
          fi
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: screenshots-${{ matrix.combo }}
          path: apps/showcase/build/day/screenshots/${{ matrix.combo }}
          if-no-files-found: warn

  # --- Android emulator: widget ---------------------------------------------
  # Real emulator via KVM (reactivecircus). The Linux emulator is x86_64-only, so
  # the .so cross-builds for x86_64 via DAY_ANDROID_ABI. continue-on-error while
  # the known postMain flake (intermittent "main thread did not respond") is chased.
  android-widget:
    name: android-widget
    runs-on: ubuntu-24.04
    needs: [fmt, clippy, msrv]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "9.6.1"
          add-job-summary: "never"
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-ndk
      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Test host-portable crates
        run: cargo test --locked
      - name: Build day CLI
        run: |
          rustup target add x86_64-linux-android
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME" >> "$GITHUB_ENV"
          cargo build --locked -p day-cli
      - name: Emulator walkthrough (android-widget)
        uses: reactivecircus/android-emulator-runner@v2
        env:
          DAY_ANDROID_ABI: x86_64
        with:
          api-level: 34
          arch: x86_64
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          # The action runs each script line as its own `sh -c`, so `cd` must share the line.
          script: cd apps/showcase && ../../target/debug/day launch -p android-widget --script scripts/walkthrough.yaml --locale fr
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: screenshots-android-widget
          path: apps/showcase/build/day/screenshots/android-widget
          if-no-files-found: warn

  # --- Windows desktop: winui / qt / gtk ------------------------------------
  # winui uses MSVC + the Windows SDK cppwinrt headers (on windows-latest) and
  # captures via RenderTargetBitmap. windows-qt / windows-gtk use the gnu toolchain +
  # MSYS2's MINGW64 GTK4/Qt6 + pkgconf, built and run inside the msys2 shell (so
  # pkg-config and the runtime DLLs resolve). windows-gtk's Rust build was confirmed
  # locally against MSYS2 GTK 4.22 (clangarm64/gnullvm); both stay experimental
  # (continue-on-error) until a full CI walkthrough is green on a real Windows host.
  windows:
    name: ${{ matrix.combo }}
    runs-on: windows-latest
    needs: [fmt, clippy, msrv]
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - combo: windows-winui
            toolkit: winui
            rust: stable
          - combo: windows-qt
            toolkit: qt
            rust: stable-x86_64-pc-windows-gnu
            msys_pkgs: mingw-w64-x86_64-qt6-base mingw-w64-x86_64-pkgconf
            shell: msys2 {0}
            experimental: true
          - combo: windows-gtk
            toolkit: gtk
            rust: stable-x86_64-pc-windows-gnu
            msys_pkgs: mingw-w64-x86_64-gtk4 mingw-w64-x86_64-pkgconf
            shell: msys2 {0}
            experimental: true
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # MSYS2 GTK4/Qt6 + pkgconf for the gnu combos. `path-type: inherit` keeps the Windows
      # PATH (rustup's cargo, the built day.exe) visible inside the msys2 shell while adding
      # /mingw64/bin — so pkg-config, the GTK/Qt .pc files, and the runtime DLLs are all found.
      # Steps that build/run Rust for these combos use `shell: msys2 {0}` (see matrix.shell); the
      # MINGW64 shell puts pkgconf's default prefix on the search path (no PKG_CONFIG_PATH hack).
      - name: Set up MSYS2 (qt/gtk)
        if: matrix.msys_pkgs
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          path-type: inherit
          install: ${{ matrix.msys_pkgs }}
      - name: Test host-portable crates
        shell: ${{ matrix.shell || 'bash' }}
        run: cargo test --locked
      - name: Clippy (winui backend)
        if: matrix.toolkit == 'winui'
        run: cargo clippy --locked -p showcase --no-default-features --features winui --all-targets
      - name: Build day CLI
        shell: ${{ matrix.shell || 'bash' }}
        run: cargo build --locked -p day-cli
      - name: Walkthrough (${{ matrix.combo }})
        shell: ${{ matrix.shell || 'bash' }}
        working-directory: apps/showcase
        run: ../../target/debug/day launch -p ${{ matrix.combo }} --script scripts/walkthrough.yaml --locale fr
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: screenshots-${{ matrix.combo }}
          path: apps/showcase/build/day/screenshots/${{ matrix.combo }}
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # msrv: the declared minimum supported Rust (workspace rust-version) still
  # builds the host-portable crates (§20.5).
  # ---------------------------------------------------------------------------
  msrv:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.89.0"
      - uses: Swatinem/rust-cache@v2
      - name: Build at MSRV
        run: cargo build --locked

  # ---------------------------------------------------------------------------
  # deny: dependency advisories + duplicate-version bans (§20.5). Runs as its own
  # check; the build combos gate on [fmt, clippy, msrv], not deny — a newly
  # published RUSTSEC advisory against an existing dependency shouldn't block
  # unrelated builds. Add deny back to each combo's `needs:` to make it a hard gate.
  # ---------------------------------------------------------------------------
  deny:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans
