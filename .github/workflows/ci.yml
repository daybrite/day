# CI (DESIGN.md §20.1) — per-OS jobs, patterns lifted from pane's per-OS matrix and hop's
# screenshot pipeline. Banked toolchain knowledge encoded here from day one: JDK pinned to 21
# (never newer — the AGP jdk-image transform breaks), rustup toolchains for cross-std,
# GSK_RENDERER=cairo for headless GTK (set by `day launch` itself), `--locked` everywhere,
# emulator boot handled by the runner action's polling.
name: ci

on:
  push:
    branches: [main]
    # Semantic-release tags run a lean release lane: fmt/msrv → the 3×2 day-CLI release
    # builds → the per-combo jobs in PACK-ONLY mode (tests, walkthroughs, and emulators are
    # skipped — the tagged commit was already validated on main; the packaging steps run
    # release-signed when the DAY_* secrets are set) → the `release` job, which publishes the GitHub
    # release (CLI binaries, installers, app packages, attestations) → the `publish` job, which uploads
    # the crates to crates.io via Trusted Publishing (OIDC — no API-key secret). The `release` job also
    # runs on every push/PR — there it only verifies publishability with `cargo publish --dry-run`.
    tags: ["v[0-9]+.[0-9]+.[0-9]+*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

#concurrency:
#  group: ci-${{ github.ref }}
#  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUST_BACKTRACE: full

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # ===========================================================================
  # Per-combo build+test+walkthrough jobs — one job per <platform>-<toolkit>.
  # Each: installs the toolkit's deps, tests the host-portable crates, builds and
  # launches the showcase for the combo, drives the dayscript walkthrough, and
  # uploads that combo's screenshots (screenshots-<combo>). Gated on the fast
  # checks (fmt/msrv). Clippy runs inside the build jobs: each combo lints its own
  # backend feature (a `--workspace` clippy cannot compile — feature unification
  # would enable several `day` backends at once and trip the one-backend-per-binary
  # compile_error! guard, §3), and linux-day carries the host-portable lints.
  # ===========================================================================

  # --- day CLI: cross-compiled release builds, shared as artifacts ----------
  # Runs right after the fast checks (fmt/msrv). Each host job cross-compiles the day CLI for
  # BOTH x86_64 and aarch64 of its OS (fail-fast: false → the two arches are independent) and uploads
  # each as `day-<os>-<arch>` (e.g. day-macos-x86_64, day-linux-aarch64). The per-platform jobs below
  # DOWNLOAD the artifact matching their own runner's os+arch instead of rebuilding day-cli.
  macos-day:
    name: macos-day (${{ matrix.arch }})
    needs: [fmt, msrv]
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: x86_64, target: x86_64-apple-darwin }
          - { arch: aarch64, target: aarch64-apple-darwin }
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build the day CLI (release, ${{ matrix.target }})
        run: cargo build --locked --release -p day-cli --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v7
        with:
          name: day-macos-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/day
          if-no-files-found: error

  linux-day:
    name: linux-day (${{ matrix.arch }})
    needs: [fmt, msrv]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: x86_64, target: x86_64-unknown-linux-gnu }
          - { arch: aarch64, target: aarch64-unknown-linux-gnu }
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # The Linux lints that need no toolkit libraries ride this job (x86_64 leg only — they are
      # arch-independent): the host-portable crates, the CLI + dayscript, and the mock backend.
      - name: Clippy (host-portable crates, CLI, mock backend)
        if: matrix.arch == 'x86_64'
        run: |
          cargo clippy --locked --all-targets
          cargo clippy --locked -p day-cli -p day-script --all-targets
          cargo clippy --locked -p showcase --no-default-features --features mock --all-targets
      # The Toolkit-duty conformance table (docs/duty-matrix.md) is generated; a Toolkit-trait
      # or backend change that forgets to regenerate it is drift, and drift is a red build.
      - name: Duty-matrix drift check
        if: matrix.arch == 'x86_64'
        run: |
          scripts/ci/duty-matrix.sh
          git diff --exit-code docs/duty-matrix.md
      # The Android cross-check lint also gates HERE (the android-widget job is continue-on-error
      # for an emulator flake, so a lint failure there would not fail the workflow). day-part-battery
      # is headless (no toolkit feature): lint its Linux + Android impls; the macOS/iOS/Windows impls
      # compile as a showcase dependency on those jobs (RUSTFLAGS=-D warnings).
      - name: Clippy (android cross-check + day-part-battery)
        if: matrix.arch == 'x86_64'
        run: |
          rustup target add aarch64-linux-android
          cargo clippy --locked --target aarch64-linux-android -p showcase --lib \
            --no-default-features --features widget
          cargo clippy --locked -p day-part-battery --all-targets
          cargo clippy --locked --target aarch64-linux-android -p day-part-battery
      # Cross to aarch64 needs a cross-linker (+ C cross-compiler for any build-script C) AND the
      # aarch64 libc dev files — gcc-aarch64-linux-gnu ships the compiler/linker but NOT the target
      # CRT startup objects (Scrt1.o/crti.o/crtn.o) + libc that the final link needs; those live in
      # libc6-dev-arm64-cross. x86_64 is native to the ubuntu runner.
      - name: Install the aarch64 cross-toolchain
        if: matrix.arch == 'aarch64'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-aarch64-linux-gnu libc6-dev-arm64-cross
          {
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc"
            echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc"
          } >> "$GITHUB_ENV"
      - name: Build the day CLI (release, ${{ matrix.target }})
        run: cargo build --locked --release -p day-cli --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v7
        with:
          name: day-linux-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/day
          if-no-files-found: error

  windows-day:
    name: windows-day (${{ matrix.arch }})
    needs: [fmt, msrv]
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: x86_64, target: x86_64-pc-windows-msvc }
          - { arch: aarch64, target: aarch64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build the day CLI (release, ${{ matrix.target }})
        run: cargo build --locked --release -p day-cli --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v7
        with:
          name: day-windows-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/day.exe
          if-no-files-found: error

  # --- Release: verify publishability always; publish the GitHub release on a semantic tag ---------
  # Runs on EVERY push / PR / tag. It ALWAYS runs `cargo publish --workspace --dry-run` to prove the
  # whole workspace could be published (versions, MPL-2.0 license, metadata, packaging). On a
  # semantic-release tag (`vX.Y.Z`) it additionally: checks the tag matches the workspace version;
  # downloads the six day-<os>-<arch> CLI binaries from the 3×2 release builds; repackages them as
  # target-triple archives; renders installer scripts + Homebrew formula from scripts/release/templates
  # (cargo-dist style: version/URLs/sizes/checksums baked in); pulls in the per-combo app packages
  # (release-signed on tags when the DAY_* secrets are set, dev-signed otherwise); writes one
  # SHA256SUMS; attests build provenance for every file; and attaches the lot to a published GitHub
  # release. The actual crates.io upload is the separate `publish` job (Trusted Publishing). `--no-verify`:
  # the workspace's per-platform toolkit crates can't all compile on one runner (iOS/Android/Qt/GTK/
  # WinUI/ArkUI) and the CI matrix already build-verifies them, so publishing only packages + uploads.
  # `!cancelled()`: the dry-run is independent of the matrix, so a flaky leg still lets the gate report.
  release:
    name: release
    if: ${{ !cancelled() }}
    needs: [macos-day, linux-day, windows-day, macos, ios-uikit, linux, android-widget, ohos-arkui, windows-winui]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      # A semantic-release tag (`vX.Y.Z…`) vs any other ref — the step-level `if:`s gate the tag-only
      # GitHub-release steps; the dry-run below runs on every ref.
      IS_TAG: ${{ startsWith(github.ref, 'refs/tags/v') }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Publishability gate — verify the workspace could publish on every push/PR/tag (a green gate on
      # the tagged commit precedes the real upload in the `publish` job).
      - name: Verify publishability (cargo publish --workspace --dry-run)
        run: cargo publish --workspace --dry-run --no-verify --locked

      # --- GitHub release (semantic tags only) ---
      - name: Check the tag matches the workspace version
        if: ${{ env.IS_TAG == 'true' }}
        run: |
          tag="${GITHUB_REF_NAME#v}"
          crate="$(sed -n 's/^version = "\(.*\)"$/\1/p' Cargo.toml | head -1)"
          if [ "$tag" != "$crate" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match [workspace.package] version $crate — bump Cargo.toml before tagging"
            exit 1
          fi
      - name: Download the day CLI artifacts (all six os/arch builds)
        if: ${{ env.IS_TAG == 'true' }}
        uses: actions/download-artifact@v7
        with:
          pattern: day-*
          path: cli-artifacts
      - name: Package target-triple archives
        if: ${{ env.IS_TAG == 'true' }}
        run: bash scripts/release/package-cli.sh cli-artifacts dist
      - name: Render installers (shell + PowerShell + Homebrew formula)
        if: ${{ env.IS_TAG == 'true' }}
        run: |
          python3 scripts/release/render-installers.py \
            --version "${GITHUB_REF_NAME#v}" --dist dist --out dist
      - name: Validate the rendered installers
        if: ${{ env.IS_TAG == 'true' }}
        run: |
          sh -n dist/day-installer.sh
          pwsh -NoProfile -Command '$null = [scriptblock]::Create((Get-Content -Raw dist/day-installer.ps1)); "ps1 parses"'
          ruby -c dist/day.rb
      - name: Download the app packages (the per-combo jobs' pack steps)
        if: ${{ env.IS_TAG == 'true' }}
        uses: actions/download-artifact@v7
        with:
          pattern: showcase-dist-*
          path: dist
          merge-multiple: true
      - name: Checksums (one manifest for every release file)
        if: ${{ env.IS_TAG == 'true' }}
        working-directory: dist
        run: |
          # render-installers' CLI-only manifest is superseded by the full one.
          rm -f day-SHA256SUMS.txt
          sha256sum -- * > SHA256SUMS
          cat SHA256SUMS
      # Build provenance for EVERY file attached to the release (archives, installers,
      # formula, app packages, checksums) — verifiable with
      # `gh attestation verify <file> -R daybrite/day`.
      - name: Attest build provenance
        if: ${{ env.IS_TAG == 'true' }}
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/*
      - name: Publish the GitHub release
        if: ${{ env.IS_TAG == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Create as a draft, attach every artifact, THEN un-draft — so the release is never
          # publicly visible in a half-uploaded state. view-or-create + --clobber + --draft=false
          # keep re-runs idempotent (a re-run re-uploads and re-publishes without error).
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 \
            || gh release create "$GITHUB_REF_NAME" --draft --verify-tag \
                 --title "Day $GITHUB_REF_NAME" --generate-notes
          gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          gh release edit "$GITHUB_REF_NAME" --draft=false

  # --- crates.io publish (semantic tags only) via Trusted Publishing --------------------------------
  # No API-key secret. crates.io Trusted Publishing exchanges this job's GitHub OIDC token (minted by
  # rust-lang/crates-io-auth-action) for a short-lived, publish-scoped token. The job runs in the
  # `release` GitHub environment the crates.io Trusted Publisher config is bound to, so only this job —
  # on a semantic tag — can mint that token. It publishes the three publishable crates
  # (day-fonts → day-toolchain → day-cli; every other member is publish=false) in dependency order;
  # --no-verify because the CI matrix already build-verifies them. `needs: [release]` orders it after
  # the version-match check + GitHub release, and only runs if the publishability dry-run passed.
  publish:
    name: publish (crates.io)
    needs: [release]
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Exchange the GitHub OIDC token for a temporary crates.io token (no stored API key).
      - name: Authenticate to crates.io (Trusted Publishing / OIDC)
        uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish --workspace --no-verify --locked

  # --- macOS desktop: appkit / qt / gtk -------------------------------------
  macos:
    name: ${{ matrix.combo }}
    runs-on: macos-15
    needs: [macos-day]
    strategy:
      fail-fast: false
      # Tag pushes trim the matrix to appkit — the only leg that packs a release artifact
      # (the .dmg); the qt/gtk legs exist for walkthrough coverage, which tag runs skip.
      matrix: >-
        ${{ startsWith(github.ref, 'refs/tags/')
            && fromJSON('{"include":[{"combo":"macos-appkit","toolkit":"appkit"}]}')
            || fromJSON('{"include":[{"combo":"macos-appkit","toolkit":"appkit"},{"combo":"macos-qt","toolkit":"qt"},{"combo":"macos-gtk","toolkit":"gtk"}]}') }}
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"
      # Release signing (§20), active on tag pushes only — branch/PR packs stay dev-signed
      # (ad-hoc) even when the repository secrets exist. Empty secrets degrade to dev tier.
      DAY_SIGN_MACOS_IDENTITY: ${{ startsWith(github.ref, 'refs/tags/') && secrets.DAY_SIGN_MACOS_IDENTITY || '' }}
      DAY_NOTARY_KEY_ID: ${{ startsWith(github.ref, 'refs/tags/') && secrets.DAY_NOTARY_KEY_ID || '' }}
      DAY_NOTARY_ISSUER: ${{ startsWith(github.ref, 'refs/tags/') && secrets.DAY_NOTARY_ISSUER || '' }}
      HAS_APPLE_CERT: ${{ startsWith(github.ref, 'refs/tags/') && secrets.DAY_APPLE_CERT_P12 != '' }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install toolkit deps
        run: |
          case "${{ matrix.toolkit }}" in
            # The full `qt` formula includes Qt WebEngine (the Qt web view). macos-gtk gets NO
            # WebKitGTK — Homebrew's has no bottle and vends the GTK3 API, and WebKitGTK isn't viable
            # on macOS-quartz, so the GTK web view is Linux/Windows only (day-piece-webview).
            qt) brew install qt pkg-config ;;
            gtk) brew install gtk4 libadwaita pkg-config ;;
          esac
      - name: Test host-portable crates
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: cargo test --locked
      - name: Clippy (appkit backend)
        if: ${{ matrix.toolkit == 'appkit' && !startsWith(github.ref, 'refs/tags/') }}
        run: cargo clippy --locked -p showcase --no-default-features --features appkit --all-targets
      - name: Download the day CLI (release, matching this runner's os+arch)
        uses: actions/download-artifact@v7
        with:
          name: day-${{ runner.os == 'macOS' && 'macos' || runner.os == 'Windows' && 'windows' || 'linux' }}-${{ runner.arch == 'ARM64' && 'aarch64' || 'x86_64' }}
          path: day-cli
      - name: Locate the day CLI (exports DAY_BIN)
        shell: bash
        run: |
          # The artifact holds exactly the one binary (day / day.exe); take its absolute path so every
          # step can invoke it as $DAY_BIN regardless of working directory.
          BIN="$(find "$(pwd)/day-cli" -maxdepth 1 -type f | head -1)"
          chmod +x "$BIN" 2>/dev/null || true
          echo "DAY_BIN=$BIN" >> "$GITHUB_ENV"
          echo "day CLI: $BIN"
      # Validate this toolkit's build environment up front — fails the job with setup instructions
      # if a required tool/SDK is missing, rather than deep inside the build.
      - name: Doctor (${{ matrix.toolkit }})
        shell: bash
        run: $DAY_BIN doctor --toolkit ${{ matrix.toolkit }}
      # Scaffold a piece + a part + a full app with `day new`, redirect their day deps to THIS
      # checkout with --local, and build each for this combo — so `day new` output keeps compiling
      # against the day tree under test (the desktop piece + app link the toolkit; the part is headless).
      - name: Scaffold smoke-test (${{ matrix.combo }})
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: |
          DAY=$DAY_BIN
          cd "$RUNNER_TEMP" && rm -rf smoke-piece smoke-part smoke-app
          "$DAY" new piece smoke-piece --toolkits ${{ matrix.toolkit }} --local "$GITHUB_WORKSPACE"
          "$DAY" new part  smoke-part  --local "$GITHUB_WORKSPACE"
          "$DAY" new app   smoke-app   --toolkit macos-${{ matrix.toolkit }} --appid com.example.smokeapp --local "$GITHUB_WORKSPACE"
          ( cd smoke-piece && cargo build --features ${{ matrix.toolkit }} )
          ( cd smoke-part  && cargo build )
          ( cd smoke-app   && cargo build --features ${{ matrix.toolkit }} )
          # Structural check of the DEFAULT (no --local) output: it must reference the remote git dep.
          rm -rf remote-check
          "$DAY" new app remote-check --toolkit macos-${{ matrix.toolkit }} --no-input >/dev/null
          grep -q 'git = "https://github.com/daybrite/day.git"' remote-check/Cargo.toml
          rm -rf remote-check
      # Screenshot variants per combo (docs/testing + website gallery): the walkthrough runs
      # once per theme × locale (light/dark × en/fr/ar/zh-CN — Arabic exercises RTL), each
      # saved under its own screenshots/<combo>/<variant>/ subdir for the gallery artifact.
      - name: Walkthrough (${{ matrix.combo }} × light/dark/fr)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        working-directory: apps/showcase
        run: |
          for TH in light dark; do
            for LOC in en fr ar zh-CN; do
              VAR=$TH; EXTRA=""
              if [ "$LOC" != en ]; then VAR="$TH-$LOC"; EXTRA="--locale $LOC"; fi
              $DAY_BIN launch -p ${{ matrix.combo }} --script dayscript/walkthrough.yaml --variant $VAR --env DAY_THEME=$TH $EXTRA
            done
          done
      # NSPasteboard is display-independent, so the real clipboard round-trip runs on every macOS
      # combo (headless Linux has no system clipboard — see dayscript/clipboard-roundtrip.yaml).
      - name: Clipboard round-trip (${{ matrix.combo }})
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        working-directory: apps/showcase
        run: $DAY_BIN launch -p ${{ matrix.combo }} --script dayscript/clipboard-roundtrip.yaml
      # Release-signing material, tag pushes only: Developer ID cert into the keychain + the
      # notary API key on disk. Without the secrets these no-op and pack dev-signs (§20).
      - name: Import the Developer ID certificate
        if: env.HAS_APPLE_CERT == 'true'
        uses: apple-actions/import-codesign-certs@v5
        with:
          p12-file-base64: ${{ secrets.DAY_APPLE_CERT_P12 }}
          p12-password: ${{ secrets.DAY_APPLE_CERT_PASSWORD }}
      - name: Materialize the notary API key (.p8)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          NOTARY_KEY_B64: ${{ secrets.DAY_NOTARY_KEY_B64 }}
        run: |
          if [ -n "$NOTARY_KEY_B64" ]; then
            echo "$NOTARY_KEY_B64" | base64 --decode > "$RUNNER_TEMP/notary.p8"
            echo "DAY_NOTARY_KEY=$RUNNER_TEMP/notary.p8" >> "$GITHUB_ENV"
          fi
      # Distribution packaging (§16.5): appkit → .dmg. No signing secrets on PR/branch runs — the
      # artifact is ad-hoc signed (dev tier) and the result JSON says so loudly (§20).
      - name: Pack (${{ matrix.combo }} → dmg)
        if: matrix.toolkit == 'appkit'
        working-directory: apps/showcase
        run: |
          $DAY_BIN pack -p ${{ matrix.combo }} --format json | tee "$RUNNER_TEMP/pack.json"
          codesign -vvv --deep --strict build/day/pack/macos-appkit/*.app
          hdiutil verify build/day/dist/*.dmg
      - name: Upload packages
        if: matrix.toolkit == 'appkit'
        uses: actions/upload-artifact@v7
        with:
          name: showcase-dist-${{ matrix.combo }}
          path: apps/showcase/build/day/dist/
          if-no-files-found: error
      - name: Upload screenshots
        if: ${{ always() && !startsWith(github.ref, 'refs/tags/') }} # tag runs skip the walkthroughs
        uses: actions/upload-artifact@v7
        with:
          name: screenshots-${{ matrix.combo }}
          path: apps/showcase/build/day/screenshots/${{ matrix.combo }}
          if-no-files-found: warn

  # --- iOS Simulator: uikit -------------------------------------------------
  ios-uikit:
    name: ios-uikit
    runs-on: macos-15
    needs: [macos-day]
    env:
      # Release signing (§20), active on tag pushes only: the distribution cert + App Store
      # Connect API key light up the device .ipa; without them (and on every branch/PR run)
      # pack zips the Simulator .app instead. Empty secrets degrade to the dev tier.
      DAY_APPLE_TEAM: ${{ startsWith(github.ref, 'refs/tags/') && secrets.DAY_APPLE_TEAM || '' }}
      DAY_ASC_KEY_ID: ${{ startsWith(github.ref, 'refs/tags/') && secrets.DAY_ASC_KEY_ID || '' }}
      DAY_ASC_ISSUER: ${{ startsWith(github.ref, 'refs/tags/') && secrets.DAY_ASC_ISSUER || '' }}
      HAS_APPLE_CERT: ${{ startsWith(github.ref, 'refs/tags/') && secrets.DAY_APPLE_CERT_P12 != '' }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          # The uikit backend cross-compiles via the Xcode script phase (§17.4). The device
          # target is for tag pushes, where pack builds the .ipa when the ASC secrets are set.
          targets: aarch64-apple-ios-sim,aarch64-apple-ios
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Test host-portable crates
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: cargo test --locked
      - name: Clippy (uikit backend)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: |
          cargo clippy --locked --target aarch64-apple-ios-sim -p showcase --lib \
            --no-default-features --features uikit
      - name: Download the day CLI (release, matching this runner's os+arch)
        uses: actions/download-artifact@v7
        with:
          name: day-${{ runner.os == 'macOS' && 'macos' || runner.os == 'Windows' && 'windows' || 'linux' }}-${{ runner.arch == 'ARM64' && 'aarch64' || 'x86_64' }}
          path: day-cli
      - name: Locate the day CLI (exports DAY_BIN)
        shell: bash
        run: |
          # The artifact holds exactly the one binary (day / day.exe); take its absolute path so every
          # step can invoke it as $DAY_BIN regardless of working directory.
          BIN="$(find "$(pwd)/day-cli" -maxdepth 1 -type f | head -1)"
          chmod +x "$BIN" 2>/dev/null || true
          echo "DAY_BIN=$BIN" >> "$GITHUB_ENV"
          echo "day CLI: $BIN"
      - name: Doctor (uikit)
        shell: bash
        run: $DAY_BIN doctor --toolkit uikit
      # Scaffold a uikit piece + a part + a full app (deps redirected to this checkout) and
      # cross-compile each for the iOS Simulator — a lib build, so no device/simulator needed here.
      # The app builds `--lib` (its `day::launch` desktop bin is not part of the iOS pipeline).
      - name: Scaffold smoke-test (ios-uikit)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: |
          DAY=$DAY_BIN
          cd "$RUNNER_TEMP" && rm -rf smoke-piece smoke-part smoke-app
          "$DAY" new piece smoke-piece --toolkits uikit --local "$GITHUB_WORKSPACE"
          "$DAY" new part  smoke-part  --local "$GITHUB_WORKSPACE"
          "$DAY" new app   smoke-app   --toolkit ios-uikit --appid com.example.smokeapp --local "$GITHUB_WORKSPACE"
          ( cd smoke-piece && cargo build --features uikit --target aarch64-apple-ios-sim )
          ( cd smoke-part  && cargo build --target aarch64-apple-ios-sim )
          ( cd smoke-app   && cargo build --lib --features uikit --target aarch64-apple-ios-sim )
      - name: Boot an iOS Simulator
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: |
          UDID=$(xcrun simctl list devices available --json \
            | jq -r '[.devices[] | .[] | select(.name | test("^iPhone"))][0].udid')
          echo "booting $UDID"
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b
      - name: Walkthrough (ios-uikit)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        working-directory: apps/showcase
        # The iOS Simulator can intermittently jettison the app mid-run; the dayscript engine then
        # reports "engine connection lost" — the app PROCESS died (a dead socket the runner cannot
        # reconnect to), NOT an assertion failure. Retry the full, idempotent walkthrough ONCE on that
        # specific flaky signal. A real assertion failure (a ✗ step, with no connection-lost) fails
        # fast so regressions are never masked; a run that logged a ✗ is never retried.
        run: |
          LOG="$RUNNER_TEMP/ios-walk.log"
          walk() { "$DAY_BIN" launch -p ios-uikit --script dayscript/walkthrough.yaml "$@" 2>&1 | tee "$LOG"; }
          # Eight screenshot variants (light/dark × en/fr/ar/zh-CN), each with the flaky-retry dance.
          run_variant() {
            if ! walk "$@"; then
              if grep -q "engine connection lost" "$LOG" && ! grep -q "✗" "$LOG"; then
                echo "::warning::iOS engine connection lost (flaky simulator app-death) — retrying the walkthrough once"
                # Best-effort: surface the most recent crash report for post-mortem if the retry also fails.
                ls -t ~/Library/Logs/DiagnosticReports/*.ips 2>/dev/null | head -1 \
                  | xargs -I{} sh -c 'echo "--- most recent crash report: {} ---"; head -60 "{}"' || true
                walk "$@"
              else
                exit 1
              fi
            fi
          }
          for TH in light dark; do
            for LOC in en fr ar zh-CN; do
              VAR=$TH; EXTRA=""
              if [ "$LOC" != en ]; then VAR="$TH-$LOC"; EXTRA="--locale $LOC"; fi
              run_variant --variant $VAR --env DAY_THEME=$TH $EXTRA
            done
          done
      # Release-signing material, tag pushes only: distribution cert + ASC API key. Without
      # the secrets these no-op and pack falls back to the Simulator .app (dev tier, §20).
      - name: Import the distribution certificate
        if: env.HAS_APPLE_CERT == 'true'
        uses: apple-actions/import-codesign-certs@v5
        with:
          p12-file-base64: ${{ secrets.DAY_APPLE_CERT_P12 }}
          p12-password: ${{ secrets.DAY_APPLE_CERT_PASSWORD }}
      - name: Materialize the ASC API key (.p8)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          ASC_KEY_B64: ${{ secrets.DAY_ASC_KEY_B64 }}
        run: |
          if [ -n "$ASC_KEY_B64" ]; then
            echo "$ASC_KEY_B64" | base64 --decode > "$RUNNER_TEMP/asc.p8"
            echo "DAY_ASC_KEY=$RUNNER_TEMP/asc.p8" >> "$GITHUB_ENV"
          fi
      # Distribution packaging (§16.5): without signing.ios (ASC API key) this is the zipped
      # Simulator .app — a device .ipa lights up when the ASC secrets are configured (§20).
      - name: Pack (ios-uikit)
        working-directory: apps/showcase
        run: $DAY_BIN pack -p ios-uikit --format json
      - name: Upload packages
        uses: actions/upload-artifact@v7
        with:
          name: showcase-dist-ios-uikit
          path: apps/showcase/build/day/dist/
          if-no-files-found: error
      - name: Upload screenshots
        if: ${{ always() && !startsWith(github.ref, 'refs/tags/') }} # tag runs skip the walkthroughs
        uses: actions/upload-artifact@v7
        with:
          name: screenshots-ios-uikit
          path: apps/showcase/build/day/screenshots/ios-uikit
          if-no-files-found: warn

  # --- Linux desktop: qt / gtk ----------------------------------------------
  linux:
    name: ${{ matrix.combo }}
    # Runs on tag pushes too (pack-only mode) — both legs pack a release .flatpak.
    runs-on: ubuntu-24.04
    needs: [linux-day]
    strategy:
      fail-fast: false
      matrix:
        include:
          - { combo: linux-qt, toolkit: qt }
          - { combo: linux-gtk, toolkit: gtk }
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install toolkit deps
        run: |
          sudo apt-get update
          # day-piece-webview needs Qt WebEngine (Qt) / WebKitGTK 6 (GTK) on top of the base libs.
          # fonts-noto-cjk: the runner image ships no CJK-capable font (only Noto Color Emoji +
          # the base DejaVu set, which covers Arabic but not Han), so without it the zh-CN
          # walkthrough variants render every Chinese glyph as a tofu box on both toolkits.
          case "${{ matrix.toolkit }}" in
            qt) sudo apt-get install -y --no-install-recommends qt6-base-dev qt6-webengine-dev pkg-config fonts-noto-cjk ;;
            gtk) sudo apt-get install -y --no-install-recommends libgtk-4-dev libadwaita-1-dev libwebkitgtk-6.0-dev pkg-config xvfb imagemagick fonts-noto-cjk ;;
          esac
      - name: Test host-portable crates
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: cargo test --locked
      # Each combo lints its own backend feature (the toolkit dev libs are installed above; a
      # workspace-wide clippy cannot compile — see the section comment).
      - name: Clippy (${{ matrix.toolkit }} backend)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: cargo clippy --locked -p showcase --no-default-features --features ${{ matrix.toolkit }} --all-targets
      - name: Download the day CLI (release, matching this runner's os+arch)
        uses: actions/download-artifact@v7
        with:
          name: day-${{ runner.os == 'macOS' && 'macos' || runner.os == 'Windows' && 'windows' || 'linux' }}-${{ runner.arch == 'ARM64' && 'aarch64' || 'x86_64' }}
          path: day-cli
      - name: Locate the day CLI (exports DAY_BIN)
        shell: bash
        run: |
          # The artifact holds exactly the one binary (day / day.exe); take its absolute path so every
          # step can invoke it as $DAY_BIN regardless of working directory.
          BIN="$(find "$(pwd)/day-cli" -maxdepth 1 -type f | head -1)"
          chmod +x "$BIN" 2>/dev/null || true
          echo "DAY_BIN=$BIN" >> "$GITHUB_ENV"
          echo "day CLI: $BIN"
      - name: Doctor (${{ matrix.toolkit }})
        shell: bash
        run: $DAY_BIN doctor --toolkit ${{ matrix.toolkit }}
      # Scaffold a piece + a part + a full app with `day new` (deps redirected to this checkout via
      # --local) and build each for this combo, so `day new` output keeps compiling against the day
      # tree under test.
      - name: Scaffold smoke-test (${{ matrix.combo }})
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: |
          DAY=$DAY_BIN
          cd "$RUNNER_TEMP" && rm -rf smoke-piece smoke-part smoke-app
          "$DAY" new piece smoke-piece --toolkits ${{ matrix.toolkit }} --local "$GITHUB_WORKSPACE"
          "$DAY" new part  smoke-part  --local "$GITHUB_WORKSPACE"
          "$DAY" new app   smoke-app   --toolkit linux-${{ matrix.toolkit }} --appid com.example.smokeapp --local "$GITHUB_WORKSPACE"
          ( cd smoke-piece && cargo build --features ${{ matrix.toolkit }} )
          ( cd smoke-part  && cargo build )
          ( cd smoke-app   && cargo build --features ${{ matrix.toolkit }} )
      # GTK renders under a virtual display: the engine snapshot waits for a real after-paint
      # frame (day-gtk), and day-cli falls back to an ImageMagick root capture of the xvfb
      # screen if it still errors. Qt runs on the offscreen platform. Both drive the full
      # dayscript walkthrough.
      # The GTK web view (WebKitGTK) needs two env vars in this restricted headless runner:
      #   WEBKIT_DISABLE_SANDBOX_THIS_IS_DANGEROUS — the bubblewrap sandbox can't create a network
      #     namespace here ("bwrap: loopback: Failed RTM_NEWADDR: Operation not permitted"), which
      #     otherwise kills the WebKit web process and aborts the app.
      #   WEBKIT_DISABLE_COMPOSITING_MODE — xvfb has no GPU (libEGL/DRI3 warnings), so render the
      #     page in software instead of via accelerated (GL) compositing.
      # Screenshot variants per combo: light/dark (DAY_THEME) × en/fr/ar/zh-CN locales.
      # (Ubuntu 24.04's Qt 6.4 predates QStyleHints::setColorScheme; day-qt-sys falls back to
      # the canonical Fusion dark palette there, so linux-qt's dark set renders dark.)
      - name: Walkthrough (${{ matrix.combo }} × light/dark/fr)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        working-directory: apps/showcase
        run: |
          for TH in light dark; do
          for LOC in en fr ar zh-CN; do
            VAR=$TH
            EXTRA="--variant $TH --env DAY_THEME=$TH"
            if [ "$LOC" != en ]; then VAR="$TH-$LOC"; EXTRA="--variant $VAR --env DAY_THEME=$TH --locale $LOC"; fi
            if [ "${{ matrix.toolkit }}" = gtk ]; then
              # The xvfb screen matches the showcase window (1000×720) so the `import -window
              # root` fallback capture (day-cli script.rs) is exactly the app, edge to edge.
              xvfb-run -a -s "-screen 0 1000x720x24" "$DAY_BIN" launch -p linux-gtk \
                --script dayscript/walkthrough.yaml $EXTRA \
                --env WEBKIT_DISABLE_SANDBOX_THIS_IS_DANGEROUS=1 \
                --env WEBKIT_DISABLE_COMPOSITING_MODE=1
            else
              "$DAY_BIN" launch -p linux-qt \
                --script dayscript/walkthrough.yaml $EXTRA \
                --env QT_QPA_PLATFORM=offscreen
            fi
          done
          done
      # Distribution packaging (§16.5): a single-file .flatpak bundle. The runtime supplies the
      # toolkit (GTK4 ⇒ org.gnome.Platform, Qt6 ⇒ org.kde.Platform) and resolves from Flathub at
      # install time (--runtime-repo), so the bundle stays app-only. ubuntu-24.04 runners don't
      # preinstall flatpak-builder.
      - name: Install flatpak tooling
        run: |
          sudo apt-get install -y --no-install-recommends flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
      - name: Pack (${{ matrix.combo }} → flatpak)
        working-directory: apps/showcase
        run: $DAY_BIN pack -p ${{ matrix.combo }} --format json
      - name: Install + inspect the bundle
        working-directory: apps/showcase
        run: |
          flatpak install --user -y ./build/day/dist/*.flatpak
          flatpak info dev.daybrite.showcase
      - name: Upload packages
        uses: actions/upload-artifact@v7
        with:
          name: showcase-dist-${{ matrix.combo }}
          path: apps/showcase/build/day/dist/
          if-no-files-found: error
      - name: Upload screenshots
        if: ${{ always() && !startsWith(github.ref, 'refs/tags/') }} # tag runs skip the walkthroughs
        uses: actions/upload-artifact@v7
        with:
          name: screenshots-${{ matrix.combo }}
          path: apps/showcase/build/day/screenshots/${{ matrix.combo }}
          if-no-files-found: warn

  # --- Android emulator: widget ---------------------------------------------
  # Real emulator via KVM (reactivecircus). The Linux emulator is x86_64-only, so
  # the .so cross-builds for x86_64 via DAY_ANDROID_ABI. continue-on-error while
  # the known postMain flake (intermittent "main thread did not respond") is chased.
  android-widget:
    name: android-widget
    runs-on: ubuntu-24.04
    needs: [linux-day]
    # Best-effort on branch/PR runs while the postMain emulator flake is chased; on tag
    # pushes the emulator never runs and the job gates the release HARD (a failed pack
    # must block the release job, not silently ship without the Android packages).
    continue-on-error: ${{ !startsWith(github.ref, 'refs/tags/') }}
    env:
      # Release signing (§20), active on tag pushes only: the Play upload keystore.
      # Empty secrets (and every branch/PR run) degrade to a CI-generated dev keystore.
      DAY_ANDROID_KEY_ALIAS: ${{ startsWith(github.ref, 'refs/tags/') && secrets.DAY_ANDROID_KEY_ALIAS || '' }}
      DAY_KS_PASS: ${{ startsWith(github.ref, 'refs/tags/') && secrets.DAY_KS_PASS || '' }}
      DAY_KEY_PASS: ${{ startsWith(github.ref, 'refs/tags/') && secrets.DAY_KEY_PASS || '' }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "9.6.1"
          add-job-summary: "never"
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-ndk
      - name: Enable KVM group perms
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Test host-portable crates
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: cargo test --locked
      - name: Set up the Android cross-compile targets
        run: |
          # x86_64 for the emulator walkthrough, aarch64 for the arm64-v8a pack.
          rustup target add x86_64-linux-android aarch64-linux-android
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME" >> "$GITHUB_ENV"
      - name: Download the day CLI (release, matching this runner's os+arch)
        uses: actions/download-artifact@v7
        with:
          name: day-${{ runner.os == 'macOS' && 'macos' || runner.os == 'Windows' && 'windows' || 'linux' }}-${{ runner.arch == 'ARM64' && 'aarch64' || 'x86_64' }}
          path: day-cli
      - name: Locate the day CLI (exports DAY_BIN)
        shell: bash
        run: |
          # The artifact holds exactly the one binary (day / day.exe); take its absolute path so every
          # step can invoke it as $DAY_BIN regardless of working directory.
          BIN="$(find "$(pwd)/day-cli" -maxdepth 1 -type f | head -1)"
          chmod +x "$BIN" 2>/dev/null || true
          echo "DAY_BIN=$BIN" >> "$GITHUB_ENV"
          echo "day CLI: $BIN"
      - name: Doctor (android)
        shell: bash
        run: $DAY_BIN doctor --toolkit android
      # Scaffold a widget piece + a part + a full app (deps redirected to this checkout) and
      # cross-compile each for Android — a lib build (rlib), so no NDK linker or emulator is needed
      # here. The app builds `--lib` (its `day::launch` desktop bin is not part of the Android pipeline).
      - name: Scaffold smoke-test (android-widget)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: |
          rustup target add aarch64-linux-android
          DAY=$DAY_BIN
          cd "$RUNNER_TEMP" && rm -rf smoke-piece smoke-part smoke-app
          "$DAY" new piece smoke-piece --toolkits widget --local "$GITHUB_WORKSPACE"
          "$DAY" new part  smoke-part  --local "$GITHUB_WORKSPACE"
          "$DAY" new app   smoke-app   --toolkit android-widget --appid com.example.smokeapp --local "$GITHUB_WORKSPACE"
          ( cd smoke-piece && cargo build --features widget --target aarch64-linux-android )
          ( cd smoke-part  && cargo build --target aarch64-linux-android )
          ( cd smoke-app   && cargo build --lib --features widget --target aarch64-linux-android )
      # Release-signing material, tag pushes only: the Play upload keystore on disk. Without
      # the secret this no-ops and pack generates a dev keystore (§20).
      - name: Materialize the upload keystore
        if: startsWith(github.ref, 'refs/tags/')
        env:
          KEYSTORE_B64: ${{ secrets.DAY_ANDROID_KEYSTORE_B64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 --decode > "$RUNNER_TEMP/upload.keystore"
            echo "DAY_ANDROID_KEYSTORE=$RUNNER_TEMP/upload.keystore" >> "$GITHUB_ENV"
          fi
      # Distribution packaging (§16.5): release .apk + .aab carrying BOTH device (arm64-v8a) and
      # emulator/desktop (x86_64) native libs — DAY_ANDROID_ABI takes a comma-separated ABI list,
      # and both rustup targets are installed above. Without signing.android secrets the keystore
      # is a CI-generated dev key — installable, marked dev-signed, never distributable (§20).
      # apksigner verify runs inside pack. Runs BEFORE the emulator walkthrough so the dist
      # artifacts survive an emulator flake.
      - name: Pack (android-widget → apk + aab)
        working-directory: apps/showcase
        env:
          DAY_ANDROID_ABI: arm64-v8a,x86_64
        run: $DAY_BIN pack -p android-widget --format json
      - name: Upload packages
        uses: actions/upload-artifact@v7
        with:
          name: showcase-dist-android-widget
          path: apps/showcase/build/day/dist/
          if-no-files-found: error
      - name: Emulator walkthrough (android-widget)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: reactivecircus/android-emulator-runner@v2
        env:
          DAY_ANDROID_ABI: x86_64
        with:
          api-level: 34
          arch: x86_64
          # Without a profile avdmanager creates a legacy 320×640 device — every screenshot
          # then reads comically oversized next to the ~400pt iPhone shots in the gallery.
          # pixel_5 is 393×851dp: the closest stock profile to the iOS simulator form factor.
          profile: pixel_5
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          # The action runs each script line as its own `sh -c`, so `cd` must share the line.
          # Screenshot variants: light/dark × en/fr/ar/zh-CN (DAY_THEME rides the intent extras).
          script: cd apps/showcase && for TH in light dark; do for LOC in en fr ar zh-CN; do VAR=$TH; EXTRA=""; if [ "$LOC" != en ]; then VAR="$TH-$LOC"; EXTRA="--locale $LOC"; fi; $DAY_BIN launch -p android-widget --script dayscript/walkthrough.yaml --variant $VAR --env DAY_THEME=$TH $EXTRA || exit 1; done; done && $DAY_BIN launch -p android-widget --script dayscript/clipboard-roundtrip.yaml
      - name: Upload screenshots
        if: ${{ always() && !startsWith(github.ref, 'refs/tags/') }} # tag runs skip the walkthroughs
        uses: actions/upload-artifact@v7
        with:
          name: screenshots-android-widget
          path: apps/showcase/build/day/screenshots/android-widget
          if-no-files-found: warn

  # --- HarmonyOS Next / OpenHarmony ArkUI emulator -------------------------
  # Brings ohos-arkui to parity with the other mobile targets: `day launch -p ohos-arkui --script …`
  # cross-compiles the app to libentry.so, packages + signs the .hap, then installs + launches + drives
  # it on an emulator over hdc, capturing screenshots for the gallery — exactly the Android/iOS flow.
  # The OpenHarmony SDK (NDK + hdc + RELEASE signing material) comes from openharmony-rs/setup-ohos-sdk;
  # the Oniro QEMU emulator boots via Day's own launcher; hvigor + ohpm (absent from the public SDK)
  # come from the command-line-tools, run under the runner's node.
  ohos-arkui:
    # EXPERIMENTAL (continue-on-error at the JOB level): the whole HarmonyOS job runs on ONE
    # x86_64 Linux runner so the x86_64 Oniro guest can run KVM-accelerated (same-arch guest +
    # /dev/kvm) instead of TCG software emulation — the boot + 8-variant walkthrough was ~25 min
    # under TCG on macOS. `day ohos emulator launch` auto-selects `-accel kvm` when /dev/kvm
    # exists (else TCG). The job is marked experimental so a HarmonyOS regression — or an emulator
    # that still won't boot under KVM — never blocks the website/release jobs that `need` it.
    #
    # (History: this ran on macos-14 because under pure TCG only fast Apple-Silicon cores booted
    # the guest reliably — ubuntu-under-TCG never rendered the first-boot keyguard. KVM removes the
    # TCG bottleneck, so x86_64 Linux should now be both far faster AND reliable. If KVM turns out
    # unavailable, set `DAY_OHOS_ACCEL=tcg,thread=multi` to force software emulation.)
    name: ohos-arkui
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: [linux-day]
    timeout-minutes: 90
    env:
      # hvigor + ohpm are NOT in the public SDK; they come from the OpenHarmony
      # command-line-tools. The bundle is Linux-packaged but hvigor/ohpm are pure JS — they run
      # under the runner's node via two-line wrappers (docs/harmonyos.md), so the same cached
      # zip serves both host OSes. RELEASE signing material ships in setup-ohos-sdk's
      # toolchains/lib.
      CLT_VERSION: "5.1.0.840"
      CLT_URL: https://repo.huaweicloud.com/harmonyos/ohpm/5.1.0/commandline-tools-linux-x64-5.1.0.840.zip
      HARMONY: apps/showcase/platform/ohos
      # Release signing (§20), active on tag pushes only: OHOS keystore/cert/profile.
      # Empty secrets (and every branch/PR run) degrade to the public dev cert.
      DAY_OHOS_KEY_ALIAS: ${{ startsWith(github.ref, 'refs/tags/') && secrets.DAY_OHOS_KEY_ALIAS || '' }}
      DAY_OHOS_KS_PASS: ${{ startsWith(github.ref, 'refs/tags/') && secrets.DAY_OHOS_KS_PASS || '' }}
      DAY_OHOS_KEY_PASS: ${{ startsWith(github.ref, 'refs/tags/') && secrets.DAY_OHOS_KEY_PASS || '' }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          # Tier-2 OHOS std targets: emulator (x86_64) + device (arm64). rustup provides the std.
          targets: aarch64-unknown-linux-ohos,x86_64-unknown-linux-ohos
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-java@v5
        # java for sign-hap.mjs (signs the provision profile + the .hap via hap-sign-tool).
        with:
          distribution: temurin
          java-version: "21"
      # The host OpenHarmony SDK (Linux, from setup-ohos-sdk) — the NDK for the Rust cross-compile,
      # hdc for the emulator, AND the full component set (ets/js/toolchains/previewer) hvigor builds
      # against. 5.1.0 is API 18, matching build-profile's compile/compatibleSdkVersion. hvigor
      # spawns SDK tools (syscap_tool, restool, es2abc) directly, so they must be host-native — which
      # the Linux SDK provides natively (on the old macOS runner this had to be the darwin SDK to
      # avoid `spawn ENOEXEC`; on Linux the ELF tools run directly).
      - uses: openharmony-rs/setup-ohos-sdk@v1
        id: ohos-sdk
        with:
          version: "5.1.0"
      - name: Put the OHOS toolchains on PATH + point OHOS_NDK_HOME at the NDK
        run: |
          # setup-ohos-sdk's own OHOS_NDK_HOME is the per-OS SDK ROOT; the NDK (the llvm cross-compilers
          # day-arkui-sys's build.rs and the cargo linkers need) is its `native` component, exposed as
          # the `ohos_sdk_native` output (…/native, a sibling of …/toolchains). Pin OHOS_NDK_HOME to it.
          NATIVE="${{ steps.ohos-sdk.outputs.ohos_sdk_native }}"
          echo "$(dirname "$NATIVE")/toolchains" >> "$GITHUB_PATH"
          echo "OHOS_NDK_HOME=$NATIVE" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_OHOS_LINKER=$NATIVE/llvm/bin/aarch64-unknown-linux-ohos-clang" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_OHOS_LINKER=$NATIVE/llvm/bin/x86_64-unknown-linux-ohos-clang" >> "$GITHUB_ENV"
      - name: Cache the OpenHarmony command-line-tools (hvigor / ohpm)
        uses: actions/cache@v4
        with:
          path: ~/ohos-clt
          key: ohos-clt-${{ env.CLT_VERSION }}
      - name: Install hvigor/ohpm from the (Linux) command-line-tools via node wrappers
        run: |
          set -euo pipefail
          C="$HOME/ohos-clt/command-line-tools"
          if [ ! -f "$C/hvigor/bin/hvigorw.js" ]; then
            mkdir -p ~/ohos-clt && cd ~/ohos-clt
            curl -fSL -o clt.zip "$CLT_URL"
            unzip -q -o clt.zip && rm -f clt.zip
          fi
          # hvigor/ohpm are pure JS — run them with the runner's own node (docs/harmonyos.md),
          # which stays identical to the local macOS dev recipe and is host-OS-agnostic.
          mkdir -p "$HOME/ohos-bin"
          printf '#!/usr/bin/env bash\nexec node "%s/hvigor/bin/hvigorw.js" "$@"\n' "$C" > "$HOME/ohos-bin/hvigorw"
          printf '#!/usr/bin/env bash\nexec node "%s/ohpm/bin/pm-cli.js" "$@"\n' "$C" > "$HOME/ohos-bin/ohpm"
          chmod +x "$HOME/ohos-bin/hvigorw" "$HOME/ohos-bin/ohpm"
          echo "$HOME/ohos-bin" >> "$GITHUB_PATH"
          echo "DEVECO_SDK_HOME=$C/sdk" >> "$GITHUB_ENV"
      - name: Assemble a versioned OpenHarmony SDK for hvigor (OHOS_BASE_SDK_HOME)
        run: |
          set -euo pipefail
          # hvigor's OpenHarmony mode (runtimeOS: "OpenHarmony") reads OHOS_BASE_SDK_HOME and
          # requires the NEW versioned layout (<base>/<api>/{ets,native,toolchains,…}). Build a
          # versioned view over the host API-18 SDK from setup-ohos-sdk. Mirrors the validated
          # local setup (docs/harmonyos.md).
          OH="$(dirname "${{ steps.ohos-sdk.outputs.ohos_sdk_native }}")"
          BASE="$HOME/ohos-ohsdk"
          mkdir -p "$BASE"
          ln -sfn "$OH" "$BASE/18"
          echo "OHOS_BASE_SDK_HOME=$BASE" >> "$GITHUB_ENV"
      - name: Clippy (arkui backend, cross-check)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        # `--lib` like the iOS/Android cross-checks: a mobile/embedded backend has no `day::launch`
        # (that's desktop-only), so the app is a cdylib — the desktop `src/main.rs` bin isn't built.
        run: cargo clippy --locked --target aarch64-unknown-linux-ohos -p showcase --lib --no-default-features --features arkui -- -D warnings
      - name: Download the day CLI (release, matching this runner's os+arch)
        uses: actions/download-artifact@v7
        with:
          name: day-${{ runner.os == 'macOS' && 'macos' || runner.os == 'Windows' && 'windows' || 'linux' }}-${{ runner.arch == 'ARM64' && 'aarch64' || 'x86_64' }}
          path: day-cli
      - name: Locate the day CLI (exports DAY_BIN)
        shell: bash
        run: |
          # The artifact holds exactly the one binary (day / day.exe); take its absolute path so every
          # step can invoke it as $DAY_BIN regardless of working directory.
          BIN="$(find "$(pwd)/day-cli" -maxdepth 1 -type f | head -1)"
          chmod +x "$BIN" 2>/dev/null || true
          echo "DAY_BIN=$BIN" >> "$GITHUB_ENV"
          echo "day CLI: $BIN"
      - name: Doctor (harmonyos)
        shell: bash
        run: $DAY_BIN doctor --toolkit harmonyos
      # ---- Emulator screenshots (best-effort from here to the walkthrough): the TCG guest is
      # slow and occasionally flaky, so these steps never fail the job — the build gates above
      # and the pack below stay hard. ----
      - name: Enable KVM group perms
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        # Same recipe as the android job: make /dev/kvm world-accessible so `qemu -accel kvm`
        # (auto-selected by `day ohos emulator launch` when /dev/kvm exists) can open it.
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Install QEMU
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        continue-on-error: true
        run: sudo apt-get update && sudo apt-get install -y qemu-system-x86 qemu-utils
      - name: Cache the Oniro emulator image
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/cache@v5
        with:
          path: ~/.cache/oniro-emulator/v6.1
          key: oniro-emulator-v6.1-oniro_emulator.zip
      - name: Boot the Oniro emulator (day ohos emulator launch --headless)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        continue-on-error: true
        run: |
          set -euo pipefail
          ZIP="$HOME/.cache/oniro-emulator/v6.1/oniro_emulator.zip"
          if [ ! -f "$ZIP" ]; then
            mkdir -p "$(dirname "$ZIP")"
            curl -fL -o "$ZIP" \
              "https://github.com/eclipse-oniro4openharmony/device_board_oniro/releases/download/v6.1/oniro_emulator.zip"
          fi
          rm -rf "$RUNNER_TEMP/oniro-emulator" && mkdir -p "$RUNNER_TEMP/oniro-emulator"
          unzip -q "$ZIP" -d "$RUNNER_TEMP/oniro-emulator"
          IMAGES="$(dirname "$(find "$RUNNER_TEMP/oniro-emulator" -name bzImage -print -quit)")"
          echo "DAY_OHOS_EMULATOR=$IMAGES" >> "$GITHUB_ENV"
          DAY_OHOS_EMULATOR="$IMAGES" $DAY_BIN ohos emulator launch --headless
      # The same walkthrough as every other target (`day launch` force-stops the singleton app
      # per cycle so each run's engine port takes effect — docs/harmonyos.md). Two variants
      # (light/dark) rather than the full eight: each TCG pass is minutes long, and the
      # gallery's OHOS column falls back per shot for the locale variants.
      - name: Emulator walkthrough (ohos-arkui × light/dark × en/fr/ar/zh-CN)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        continue-on-error: true
        working-directory: apps/showcase
        # The same theme × locale matrix as the other walkthrough legs (the gallery's non-English
        # ohos tiles fell back to the English captures before these variants existed). Every
        # variant is individually best-effort — one TCG flake must not skip the remaining runs.
        run: |
          for TH in light dark; do
            for LOC in en fr ar zh-CN; do
              VAR=$TH; EXTRA=""
              if [ "$LOC" != en ]; then VAR="$TH-$LOC"; EXTRA="--locale $LOC"; fi
              $DAY_BIN launch -p ohos-arkui --script dayscript/walkthrough.yaml \
                --variant $VAR --env DAY_THEME=$TH $EXTRA \
                || echo "::warning::ohos walkthrough variant $VAR failed"
            done
          done
      # Release-signing material, tag pushes only: OHOS keystore + cert + provision profile on
      # disk. Without the secrets these no-op and pack signs with the public dev cert (§20).
      - name: Materialize OHOS signing material
        if: startsWith(github.ref, 'refs/tags/')
        env:
          KEYSTORE_B64: ${{ secrets.DAY_OHOS_KEYSTORE_B64 }}
          CERT_B64: ${{ secrets.DAY_OHOS_CERT_B64 }}
          PROFILE_B64: ${{ secrets.DAY_OHOS_PROFILE_B64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 --decode > "$RUNNER_TEMP/ohos.p12"
            echo "DAY_OHOS_KEYSTORE=$RUNNER_TEMP/ohos.p12" >> "$GITHUB_ENV"
          fi
          if [ -n "$CERT_B64" ]; then
            echo "$CERT_B64" | base64 --decode > "$RUNNER_TEMP/ohos.cer"
            echo "DAY_OHOS_CERT=$RUNNER_TEMP/ohos.cer" >> "$GITHUB_ENV"
          fi
          if [ -n "$PROFILE_B64" ]; then
            echo "$PROFILE_B64" | base64 --decode > "$RUNNER_TEMP/ohos.p7b"
            echo "DAY_OHOS_PROFILE=$RUNNER_TEMP/ohos.p7b" >> "$GITHUB_ENV"
          fi
      # Distribution packaging (§16.5): the .hap, release-signed when signing.ohos material is
      # configured; the public-cert dev signature otherwise (emulator installs only, dev tier).
      # DAY_OHOS_ARCH pins the packaged .so to arm64 (devices); the emulator runs x86_64.
      - name: Pack (ohos-arkui → hap)
        working-directory: apps/showcase
        env:
          DAY_OHOS_ARCH: arm64
        run: $DAY_BIN pack -p ohos-arkui --format json
      - name: Upload packages
        uses: actions/upload-artifact@v7
        with:
          name: showcase-dist-ohos-arkui
          path: apps/showcase/build/day/dist/
          if-no-files-found: error
      - name: Upload screenshots
        if: ${{ always() && !startsWith(github.ref, 'refs/tags/') }} # tag runs skip the walkthroughs
        uses: actions/upload-artifact@v7
        with:
          name: screenshots-ohos-arkui
          path: apps/showcase/build/day/screenshots/ohos-arkui
          if-no-files-found: warn
      - name: Upload the .hap (post-mortem)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ohos-arkui-artifacts
          path: apps/showcase/platform/ohos/entry/build/**/*.hap
          if-no-files-found: ignore

  # --- Windows desktop: winui (MSVC) ----------------------------------------
  # winui uses MSVC + the Windows SDK cppwinrt headers (on windows-latest) and
  # captures via RenderTargetBitmap. It runs on the default `bash` shell. It is a
  # SEPARATE job from windows-qt / windows-gtk because those need the msys2 shell:
  # the `matrix` context is not available in a step's `shell:` field, so a single
  # matrix cannot switch shells per combo — the toolchains are split into two jobs.
  windows-winui:
    name: windows-winui
    runs-on: windows-latest
    needs: [windows-day]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Test host-portable crates
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: cargo test --locked
      - name: Clippy (winui backend)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: cargo clippy --locked -p showcase --no-default-features --features winui --all-targets
      # Lint the headless day-part-battery crate's Windows impl (GetSystemPowerStatus) on a real Windows host.
      - name: Clippy (day-part-battery, Windows impl)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: cargo clippy --locked -p day-part-battery --all-targets
      - name: Download the day CLI (release, matching this runner's os+arch)
        uses: actions/download-artifact@v7
        with:
          name: day-${{ runner.os == 'macOS' && 'macos' || runner.os == 'Windows' && 'windows' || 'linux' }}-${{ runner.arch == 'ARM64' && 'aarch64' || 'x86_64' }}
          path: day-cli
      - name: Locate the day CLI (exports DAY_BIN)
        shell: bash
        run: |
          # The artifact holds exactly the one binary (day / day.exe); take its absolute path so every
          # step can invoke it as $DAY_BIN regardless of working directory.
          BIN="$(find "$(pwd)/day-cli" -maxdepth 1 -type f | head -1)"
          chmod +x "$BIN" 2>/dev/null || true
          echo "DAY_BIN=$BIN" >> "$GITHUB_ENV"
          echo "day CLI: $BIN"
      - name: Doctor (winui)
        shell: bash
        run: $DAY_BIN doctor --toolkit winui
      # The only CI job that can compile `day new`'s winui template branch: scaffold a winui piece +
      # a part + a full app (deps redirected to this checkout) and build each. winui is a desktop
      # day::launch backend, so the app builds fully (its C++/WinRT shim is built on this Windows host).
      - name: Scaffold smoke-test (windows-winui)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: |
          DAY=$DAY_BIN
          cd "$RUNNER_TEMP" && rm -rf smoke-piece smoke-part smoke-app
          "$DAY" new piece smoke-piece --toolkits winui --local "$GITHUB_WORKSPACE"
          "$DAY" new part  smoke-part  --local "$GITHUB_WORKSPACE"
          "$DAY" new app   smoke-app   --toolkit windows-winui --appid com.example.smokeapp --local "$GITHUB_WORKSPACE"
          ( cd smoke-piece && cargo build --features winui )
          ( cd smoke-part  && cargo build )
          ( cd smoke-app   && cargo build --features winui )
      - name: Walkthrough (windows-winui × light/dark/fr)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        working-directory: apps/showcase
        run: |
          for TH in light dark; do
            for LOC in en fr ar zh-CN; do
              VAR=$TH; EXTRA=""
              if [ "$LOC" != en ]; then VAR="$TH-$LOC"; EXTRA="--locale $LOC"; fi
              $DAY_BIN launch -p windows-winui --script dayscript/walkthrough.yaml --variant $VAR --env DAY_THEME=$TH $EXTRA
            done
          done
      # Distribution packaging (§16.5): .msix (makeappx + signtool, self-signed dev cert without
      # signing.windows secrets) + NSIS -setup.exe. windows-2025 runners don't preinstall NSIS.
      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y --no-progress
      - name: Pack (windows-winui → msix + setup.exe)
        working-directory: apps/showcase
        run: $DAY_BIN pack -p windows-winui --format json
      - name: Upload packages
        uses: actions/upload-artifact@v7
        with:
          name: showcase-dist-windows-winui
          path: apps/showcase/build/day/dist/
          if-no-files-found: error
      - name: Upload screenshots
        if: ${{ always() && !startsWith(github.ref, 'refs/tags/') }} # tag runs skip the walkthroughs
        uses: actions/upload-artifact@v7
        with:
          name: screenshots-windows-winui
          path: apps/showcase/build/day/screenshots/windows-winui
          if-no-files-found: warn

  # --- Windows desktop: qt / gtk (gnu toolchain + MSYS2) --------------------
  # windows-qt / windows-gtk use the gnu toolchain + MSYS2's MINGW64 GTK4/Qt6 +
  # pkgconf, built and run inside the msys2 shell (so pkg-config and the runtime
  # DLLs resolve). The whole job defaults to `msys2 {0}` — every `run:` step here is
  # a cargo build/test that must see MINGW64's pkgconf; the action-only setup steps
  # (checkout/toolchain/cache/setup-msys2) don't use the job shell, and setup-msys2
  # runs before the first `run:` step, so the shell exists when it's first needed.
  # `path-type: inherit` keeps the Windows PATH (rustup's cargo, the built day.exe)
  # visible while adding /mingw64/bin. windows-gtk's Rust build was confirmed locally
  # against MSYS2 GTK 4.22 (clangarm64/gnullvm); both stay experimental
  # (continue-on-error) until a full CI walkthrough is green on a real Windows host.
  windows-msys2:
    name: ${{ matrix.combo }}
    if: ${{ !startsWith(github.ref, 'refs/tags/') }} # experimental + packs no release artifact — skip on tags
    runs-on: windows-latest
    needs: [windows-day]
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          # mingw-w64-x86_64-gcc provides the mingw gcc/g++ the pin step below points the linker
          # (and the cc crate) at — the runner has no MSYS2 mingw compiler otherwise, only the libs.
          # Neither web view has an MSYS2/MINGW64 package: no Qt6 WebEngine and no WebKitGTK 6 (both
          # embed a browser engine — Chromium / WebKit — that won't build with MinGW GCC). So
          # day-piece-webview degrades on both: the Qt view to a URL label (build.rs probes pkg-config
          # for Qt6WebEngineWidgets), the GTK view to day's placeholder leaf (webkit6 is gated off
          # Windows in Cargo.toml, exactly like macOS).
          - combo: windows-qt
            toolkit: qt
            msys_pkgs: mingw-w64-x86_64-gcc mingw-w64-x86_64-qt6-base mingw-w64-x86_64-pkgconf
          - combo: windows-gtk
            toolkit: gtk
            msys_pkgs: mingw-w64-x86_64-gcc mingw-w64-x86_64-gtk4 mingw-w64-x86_64-libadwaita mingw-w64-x86_64-pkgconf
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable-x86_64-pc-windows-gnu
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Set up MSYS2 (qt/gtk)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          path-type: inherit
          install: ${{ matrix.msys_pkgs }}
      # rustup's windows-gnu toolchain links via whatever `x86_64-w64-mingw32-gcc` is first on
      # PATH — on the runner that resolves to a *different* mingw (C:\mingw64) which lacks the
      # MSYS2 Qt6/GTK4/glib import libs, so `-lQt6Widgets` / `-lglib-2.0` fail to link. Force
      # MSYS2's mingw to the front of PATH and pin the linker + the `cc` crate's compiler (for the
      # C++ shims) to MSYS2's own gcc, so /mingw64/lib is searched. Forward-slash paths link cleanly.
      - name: Pin the MSYS2 mingw toolchain (finds MSYS2 Qt6/GTK4 libs)
        run: |
          cygpath -w "$MINGW_PREFIX/bin" >> "$GITHUB_PATH"
          GCC="$(cygpath -m "$MINGW_PREFIX/bin/gcc.exe")"
          echo "CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER=$GCC" >> "$GITHUB_ENV"
          echo "CC=$GCC" >> "$GITHUB_ENV"
          echo "CXX=$(cygpath -m "$MINGW_PREFIX/bin/g++.exe")" >> "$GITHUB_ENV"
      - name: Test host-portable crates
        run: cargo test --locked
      - name: Download the day CLI (release, matching this runner's os+arch)
        uses: actions/download-artifact@v7
        with:
          name: day-${{ runner.os == 'macOS' && 'macos' || runner.os == 'Windows' && 'windows' || 'linux' }}-${{ runner.arch == 'ARM64' && 'aarch64' || 'x86_64' }}
          path: day-cli
      - name: Locate the day CLI (exports DAY_BIN)
        shell: bash
        run: |
          # The artifact holds exactly the one binary (day / day.exe); take its absolute path so every
          # step can invoke it as $DAY_BIN regardless of working directory.
          BIN="$(find "$(pwd)/day-cli" -maxdepth 1 -type f | head -1)"
          chmod +x "$BIN" 2>/dev/null || true
          echo "DAY_BIN=$BIN" >> "$GITHUB_ENV"
          echo "day CLI: $BIN"
      - name: Doctor (${{ matrix.toolkit }})
        shell: bash
        run: $DAY_BIN doctor --toolkit ${{ matrix.toolkit }}
      # WEBKIT_DISABLE_COMPOSITING_MODE is a harmless no-op on Windows now (neither combo has a real
      # web engine — Qt degrades to a label, GTK to a placeholder); kept so the invocation matches the
      # Linux GTK job, where the same var is load-bearing for the real WebKitGTK view.
      - name: Walkthrough (${{ matrix.combo }} × light/dark/fr)
        working-directory: apps/showcase
        run: |
          for TH in light dark; do
            for LOC in en fr ar zh-CN; do
              VAR=$TH; EXTRA=""
              if [ "$LOC" != en ]; then VAR="$TH-$LOC"; EXTRA="--locale $LOC"; fi
              $DAY_BIN launch -p ${{ matrix.combo }} --script dayscript/walkthrough.yaml --variant $VAR --env DAY_THEME=$TH $EXTRA --env WEBKIT_DISABLE_COMPOSITING_MODE=1
            done
          done
      - name: Upload screenshots
        if: ${{ always() && !startsWith(github.ref, 'refs/tags/') }} # tag runs skip the walkthroughs
        uses: actions/upload-artifact@v7
        with:
          name: screenshots-${{ matrix.combo }}
          path: apps/showcase/build/day/screenshots/${{ matrix.combo }}
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # msrv: the declared minimum supported Rust (workspace rust-version) still
  # builds the host-portable crates (§20.5).
  # ---------------------------------------------------------------------------
  msrv:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.89.0"
      - uses: Swatinem/rust-cache@v2
      - name: Build at MSRV
        run: cargo build --locked

  # ---------------------------------------------------------------------------
  # deny: dependency advisories + duplicate-version bans (§20.5). Runs as its own
  # check; the build combos gate on [fmt, clippy, msrv], not deny — a newly
  # published RUSTSEC advisory against an existing dependency shouldn't block
  # unrelated builds. Add deny back to each combo's `needs:` to make it a hard gate.
  # ---------------------------------------------------------------------------
  deny:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans

  # ---------------------------------------------------------------------------
  # api-docs: generate the Rust API reference (rustdoc) for the public-facing Day crates and share it
  # as an artifact the website job drops into dist/api (linked from /docs/api). The build is PORTABLE —
  # the core crates need no features and the `day` umbrella uses its headless `mock` backend — so no
  # native toolkit is installed and it runs on a stock runner. Crate list + `cargo doc` invocations
  # live in scripts/build-api-docs.sh, driven by website/src/data/api-crates.json (same file the bridge
  # page reads). Runs in parallel with the platform jobs; a failure degrades gracefully (the website
  # still deploys — the API pages 404 until the next green run) rather than blocking the site.
  # ---------------------------------------------------------------------------
  api-docs:
    name: api-docs (rustdoc)
    if: ${{ !startsWith(github.ref, 'refs/tags/') }} # feeds the website, which tag pushes skip
    needs: [fmt, msrv]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Generate rustdoc for the public crates
        run: scripts/build-api-docs.sh
      - name: Upload the API reference
        uses: actions/upload-artifact@v7
        with:
          name: api-docs
          path: target/doc
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # website: build the Astro site (website/) and deploy it to GitHub Pages at the custom
  # domain https://daybrite.dev (public/CNAME pins it). Runs AFTER every screenshot-producing job so
  # it can download their `screenshots-<combo>` artifacts and assemble the gallery
  # from the latest captures. `!cancelled()` (not `success()`) means a platform
  # that failed to produce screenshots does not block the deploy — the gallery
  # simply shows whatever platforms succeeded (the assembly emits placeholders for
  # the rest). Builds on every push/PR (validation); a separate job deploys only
  # from main so PRs never publish. Enable Pages via Settings → Pages → Source:
  # "GitHub Actions".
  # ---------------------------------------------------------------------------
  website:
    name: website (build)
    needs: [macos, ios-uikit, linux, android-widget, ohos-arkui, windows-winui, windows-msys2, api-docs]
    # Runs even when some platform legs fail (!cancelled), but not on tag pushes (those run
    # the release pipeline instead).
    if: ${{ !cancelled() && !startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json
      - name: Download every platform's screenshots
        # Each screenshot job uploads `screenshots-<combo>`; grab them all into
        # website/artifacts/screenshots-<combo>/… where the assembly expects them.
        # continue-on-error: a run where no platform produced screenshots still deploys.
        uses: actions/download-artifact@v7
        continue-on-error: true
        with:
          pattern: screenshots-*
          path: website/artifacts
      - name: Build the site (assembles the gallery from the artifacts)
        working-directory: website
        run: |
          npm ci
          npm run build
      - name: Add the Rust API reference (dist/api)
        # Drop the api-docs job's rustdoc bundle into the built site at /api (linked from /docs/api).
        # continue-on-error: a run where the doc build failed still deploys — the API pages 404 until
        # the next green run rather than blocking the whole site (matches the gallery's resilience).
        uses: actions/download-artifact@v7
        continue-on-error: true
        with:
          name: api-docs
          path: website/dist/api
      # Validate every internal link on every generated page (external links are skipped — flaky and
      # not ours; the generated /api rustdoc subtree is skipped — cargo doc validates its own links).
      # A broken internal link fails the build BEFORE the Pages artifact is uploaded.
      - name: Check for broken links
        working-directory: website
        run: npm run linkcheck
      - name: Upload the Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: website/dist

  deploy-website:
    name: website (deploy)
    needs: website
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
